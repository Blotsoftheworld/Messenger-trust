<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доверие — Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0f0619; color: #e8e0f0; height: 100vh; display: flex; }
        #auth { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #1a0d2e, #080311); z-index: 10; }
        #auth.hidden { display: none; }
        .card { background: #1a0d2e; border: 1px solid #2a1848; border-radius: 20px; padding: 25px; width: 360px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
        .card h1 { color: #8b5cf6; margin: 5px 0; font-size: 24px; }
        .tabs { display: flex; background: #0f0619; border-radius: 25px; padding: 3px; margin: 12px 0; }
        .tab { flex: 1; padding: 8px; border: none; background: none; color: #b8a9d0; cursor: pointer; border-radius: 22px; font-weight: 600; font-size: 13px; }
        .tab.active { background: #8b5cf6; color: #fff; }
        .form { display: none; flex-direction: column; gap: 8px; }
        .form.active { display: flex; }
        input { padding: 10px; background: #1e1133; border: 2px solid #2a1848; border-radius: 8px; color: #e8e0f0; outline: none; font-size: 14px; }
        input:focus { border-color: #8b5cf6; }
        button { padding: 10px; background: #8b5cf6; color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        button:hover { opacity: 0.9; }
        .error { color: #ef4444; font-size: 12px; min-height: 16px; }
        .success { color: #22c55e; font-size: 12px; }
        #app { display: flex; width: 100vw; height: 100vh; }
        #app.hidden { display: none; }
        .sidebar { width: 300px; background: #130924; border-right: 1px solid #2a1848; display: flex; flex-direction: column; }
        .side-head { padding: 12px; border-bottom: 1px solid #2a1848; display: flex; align-items: center; gap: 8px; }
        .av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 15px; background: #7c3aed; }
        .chat-list { flex: 1; overflow-y: auto; padding: 5px; }
        .chat-item { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 8px; cursor: pointer; }
        .chat-item:hover { background: rgba(139,92,246,0.1); }
        .chat-item.active { background: rgba(139,92,246,0.2); }
        .main { flex: 1; display: flex; flex-direction: column; background: #0d0418; }
        .msgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 4px; }
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 14px; font-size: 13px; word-wrap: break-word; }
        .msg.own { align-self: flex-end; background: #7c3aed; color: #fff; }
        .msg.other { align-self: flex-start; background: #251840; }
        .input-box { padding: 10px; border-top: 1px solid #2a1848; display: flex; gap: 8px; background: #130924; }
        .input-box input { flex: 1; border-radius: 20px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 20; }
        .modal.hidden { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth">
    <div class="card">
        <div style="font-size:40px;">💜</div>
        <h1>Доверие</h1>
        <p style="color:#b8a9d0;font-size:13px;">Мессенджер</p>
        <div class="tabs">
            <button class="tab active" id="tab1">Вход</button>
            <button class="tab" id="tab2">Регистрация</button>
        </div>
        <form class="form active" id="f1">
            <input id="l1" placeholder="Никнейм" required>
            <input id="l2" placeholder="Email" required>
            <input id="l3" type="password" placeholder="Пароль" required>
            <div class="error" id="e1"></div>
            <button type="submit">Войти</button>
        </form>
        <form class="form" id="f2">
            <input id="r1" placeholder="Никнейм (мин. 3 символа)" required minlength="3">
            <input id="r2" placeholder="Email" required>
            <input id="r3" type="password" placeholder="Пароль (мин. 4 символа)" required minlength="4">
            <input id="r4" type="password" placeholder="Повторите пароль" required>
            <div class="error" id="e2"></div>
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>
</div>

<div id="app" class="hidden">
    <div class="sidebar">
        <div class="side-head">
            <div class="av" id="ava">?</div>
            <div style="flex:1">
                <b id="nam"></b>
                <div style="font-size:10px;color:#7a6b90" id="sta">В сети</div>
            </div>
            <button style="width:32px;height:32px;border-radius:50%;font-size:18px;background:#1e1133;border:none;color:#b8a9d0;cursor:pointer" id="addBtn" title="Добавить друга">+</button>
        </div>
        <div class="chat-list" id="list">
            <div style="text-align:center;padding:20px;color:#7a6b90;">Загрузка...</div>
        </div>
    </div>
    <div class="main">
        <div id="empty" style="flex:1;display:flex;align-items:center;justify-content:center;color:#7a6b90;flex-direction:column">
            <div style="font-size:60px;opacity:0.5;">💜</div>
            <h3>Выберите чат</h3>
            <p style="font-size:13px;">или добавьте друга</p>
        </div>
        <div id="head" class="hidden" style="padding:10px;border-bottom:1px solid #2a1848;display:flex;align-items:center;gap:8px">
            <div class="av" id="pav">?</div>
            <b id="pnm"></b>
        </div>
        <div class="msgs hidden" id="msgs"></div>
        <div class="input-box hidden" id="inp">
            <input id="txt" placeholder="Напишите сообщение...">
            <button style="width:36px;height:36px;border-radius:50%;font-size:18px;padding:0" id="snd">➤</button>
        </div>
    </div>
</div>

<div class="modal hidden" id="mod">
    <div class="card">
        <h3>➕ Добавить друга</h3>
        <p style="color:#b8a9d0;font-size:12px;margin:5px 0;">Введите точный никнейм</p>
        <input id="fn" placeholder="Никнейм друга" style="margin:8px 0">
        <div class="error" id="fe"></div>
        <div class="success" id="fs"></div>
        <button id="cf">Добавить</button>
        <button id="cl" style="background:none;border:2px solid #2a1848;margin-top:5px">Отмена</button>
    </div>
</div>

<script>
// ВАШИ ДАННЫЕ JSONBIN
const BIN_ID = '6a550b47da38895dfe57a6ca';
const API_KEY = '$2a$10$KiP/8lAd8kH3cgOTTCiUpOAR.vGUj7Nz23lSGU4Z2udjUG8GycMmG';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const $ = id => document.getElementById(id);
let me = null, chat = null, timer = null;

// Загрузка с сервера
async function load() {
    try {
        const r = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
        if (!r.ok) throw new Error('Ошибка загрузки');
        return (await r.json()).record;
    } catch (e) {
        console.error(e);
        return { users: [], messages: {} };
    }
}

// Сохранение на сервер
async function save(data) {
    try {
        await fetch(API_URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(data)
        });
    } catch (e) { console.error(e); }
}

// Вкладки
$('tab1').onclick = () => { $('tab1').classList.add('active'); $('tab2').classList.remove('active'); $('f1').classList.add('active'); $('f2').classList.remove('active'); };
$('tab2').onclick = () => { $('tab2').classList.add('active'); $('tab1').classList.remove('active'); $('f2').classList.add('active'); $('f1').classList.remove('active'); };

// Регистрация
$('f2').onsubmit = async (e) => {
    e.preventDefault();
    $('e2').textContent = '';
    const nick = $('r1').value.trim();
    const email = $('r2').value.trim();
    const pass = $('r3').value;
    
    if (pass !== $('r4').value) return $('e2').textContent = 'Пароли не совпадают';
    if (nick.length < 3) return $('e2').textContent = 'Никнейм от 3 символов';
    if (pass.length < 4) return $('e2').textContent = 'Пароль от 4 символов';
    
    const db = await load();
    if (db.users.find(u => u.nick === nick)) return $('e2').textContent = 'Никнейм занят';
    if (db.users.find(u => u.email === email)) return $('e2').textContent = 'Email занят';
    
    const newUser = { nick, email, pass, avatar: '#7c3aed', status: 'В сети', friends: [] };
    db.users.push(newUser);
    await save(db);
    
    me = newUser;
    show();
};

// Вход
$('f1').onsubmit = async (e) => {
    e.preventDefault();
    $('e1').textContent = '';
    const nick = $('l1').value.trim();
    const email = $('l2').value.trim();
    const pass = $('l3').value;
    
    const db = await load();
    const user = db.users.find(u => u.nick === nick && u.email === email && u.pass === pass);
    if (!user) return $('e1').textContent = 'Неверные данные';
    
    me = user;
    show();
};

function show() {
    $('auth').classList.add('hidden');
    $('app').classList.remove('hidden');
    $('ava').textContent = me.nick[0].toUpperCase();
    $('nam').textContent = me.nick;
    $('sta').textContent = me.status;
    update();
    timer = setInterval(update, 2000);
}

async function update() {
    if (!me) return;
    const db = await load();
    me = db.users.find(u => u.nick === me.nick) || me;
    
    // Чаты
    const chats = [];
    const seen = new Set();
    
    Object.entries(db.messages).forEach(([id, msgs]) => {
        if (id.includes(me.nick) && msgs.length > 0) {
            const p = id.split('_').find(x => x !== me.nick);
            if (!seen.has(p)) {
                seen.add(p);
                const last = msgs[msgs.length - 1];
                chats.push({ partner: p, last: last.text, time: last.time });
            }
        }
    });
    
    me.friends.forEach(f => {
        if (!seen.has(f)) chats.push({ partner: f, last: 'Начните общение!', time: 0 });
    });
    
    chats.sort((a, b) => b.time - a.time);
    
    $('list').innerHTML = chats.length ? chats.map(c => `
        <div class="chat-item ${chat === c.partner ? 'active' : ''}" data-p="${c.partner}">
            <div class="av">${c.partner[0].toUpperCase()}</div>
            <div style="flex:1">
                <div style="font-weight:600;font-size:13px;">${c.partner}</div>
                <div style="font-size:11px;color:#7a6b90;">${c.last.slice(0, 25)}</div>
            </div>
            ${c.time ? `<div style="font-size:10px;color:#7a6b90;">${new Date(c.time).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'})}</div>` : ''}
        </div>
    `).join('') : '<div style="text-align:center;padding:20px;color:#7a6b90;">Нет чатов</div>';
    
    document.querySelectorAll('.chat-item').forEach(el => el.onclick = () => open(el.dataset.p));
    
    if (chat) {
        const id = [me.nick, chat].sort().join('_');
        const msgs = db.messages[id] || [];
        $('msgs').innerHTML = msgs.length ? msgs.map(m => `
            <div class="msg ${m.from === me.nick ? 'own' : 'other'}">
                ${m.text}
                <div style="font-size:9px;opacity:0.6;margin-top:2px;text-align:right;">${new Date(m.time).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'})}</div>
            </div>
        `).join('') : '<div style="text-align:center;color:#7a6b90;padding:20px;">💜 Начните переписку!</div>';
        $('msgs').scrollTop = $('msgs').scrollHeight;
    }
}

function open(p) {
    chat = p;
    $('empty').classList.add('hidden');
    $('head').classList.remove('hidden');
    $('msgs').classList.remove('hidden');
    $('inp').classList.remove('hidden');
    $('pav').textContent = p[0].toUpperCase();
    $('pnm').textContent = p;
    update();
}

$('snd').onclick = async () => {
    const text = $('txt').value.trim();
    if (!text || !chat) return;
    
    const db = await load();
    const id = [me.nick, chat].sort().join('_');
    if (!db.messages[id]) db.messages[id] = [];
    db.messages[id].push({ from: me.nick, text, time: Date.now() });
    await save(db);
    
    $('txt').value = '';
    update();
};

$('txt').onkeydown = e => { if (e.key === 'Enter') $('snd').click(); };

$('addBtn').onclick = () => {
    $('mod').classList.remove('hidden');
    $('fn').value = '';
    $('fe').textContent = '';
    $('fs').textContent = '';
};

$('cl').onclick = () => $('mod').classList.add('hidden');

$('cf').onclick = async () => {
    const nick = $('fn').value.trim();
    if (!nick) return $('fe').textContent = 'Введите ник';
    if (nick === me.nick) return $('fe').textContent = 'Это вы';
    
    const db = await load();
    const friend = db.users.find(u => u.nick === nick);
    if (!friend) return $('fe').textContent = 'Пользователь не найден. Зарегистрируйте друга!';
    
    const user = db.users.find(u => u.nick === me.nick);
    if (user.friends.includes(nick)) return $('fe').textContent = 'Уже в друзьях';
    
    user.friends.push(nick);
    friend.friends.push(me.nick);
    await save(db);
    
    $('fs').textContent = '✅ Добавлен!';
    setTimeout(() => {
        $('mod').classList.add('hidden');
        update();
    }, 1000);
};
</script>
</body>
</html>
