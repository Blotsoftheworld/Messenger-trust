<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доверие — Мессенджер</title>
    <style>
        :root {
            --bg-primary: #0f0619;
            --bg-secondary: #1a0d2e;
            --bg-sidebar: #130924;
            --bg-chat: #0d0418;
            --bg-input: #1e1133;
            --bg-message-own: #7c3aed;
            --bg-message-other: #251840;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --text-primary: #e8e0f0;
            --text-secondary: #b8a9d0;
            --text-muted: #7a6b90;
            --border: #2a1848;
            --danger: #ef4444;
            --success: #22c55e;
            --gradient-accent: linear-gradient(135deg, #7c3aed, #5b21b6);
            --shadow: 0 4px 24px rgba(0,0,0,0.5);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #000; color: var(--text-primary);
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-container {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, #1a0d2e 0%, #080311 70%);
            z-index: 100; transition: 0.4s;
        }
        .auth-container.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .auth-card {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 20px; padding: 40px 35px; width: 420px; max-width: 95vw;
            box-shadow: var(--shadow); text-align: center;
        }
        .auth-logo { font-size: 48px; margin-bottom: 8px; }
        .auth-title {
            font-size: 28px; font-weight: 700;
            background: var(--gradient-accent); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 4px;
        }
        .auth-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }
        .auth-tabs {
            display: flex; gap: 4px; background: var(--bg-primary);
            border-radius: 30px; padding: 4px; margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1; padding: 10px 16px; border-radius: 28px; border: none;
            cursor: pointer; font-weight: 600; transition: var(--transition);
            background: transparent; color: var(--text-secondary);
        }
        .auth-tab.active { background: var(--accent); color: #fff; }
        .auth-form { display: none; flex-direction: column; gap: 14px; }
        .auth-form.active { display: flex; }
        .input-group { text-align: left; }
        .input-group label {
            display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary);
            margin-bottom: 5px; text-transform: uppercase;
        }
        .input-group input {
            width: 100%; padding: 12px 16px; background: var(--bg-input);
            border: 2px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 15px; outline: none;
            transition: var(--transition);
        }
        .input-group input:focus { border-color: var(--accent); }
        .btn {
            padding: 13px 24px; border: none; border-radius: 30px; cursor: pointer;
            font-weight: 600; font-size: 15px; transition: var(--transition);
        }
        .btn-primary {
            background: var(--gradient-accent); color: #fff;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4);
        }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(124,58,237,0.55); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-primary); }
        .auth-error { color: var(--danger); font-size: 13px; min-height: 20px; text-align: center; }
        .auth-success { color: var(--success); font-size: 13px; }

        .app-container {
            display: flex; width: 100vw; height: 100vh; max-width: 1400px;
            background: var(--bg-primary); opacity: 0; visibility: hidden;
            transition: 0.4s; position: relative;
        }
        .app-container.visible { opacity: 1; visibility: visible; }
        .sidebar {
            width: 350px; min-width: 350px; background: var(--bg-sidebar);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
        .avatar {
            width: 42px; height: 42px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-weight: 700;
            color: #fff;
        }
        .user-name { font-weight: 600; }
        .user-status { font-size: 12px; color: var(--text-muted); }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%; background: var(--bg-input);
            border: none; cursor: pointer; font-size: 18px; display: flex;
            align-items: center; justify-content: center; color: var(--text-secondary);
        }
        .icon-btn:hover { background: var(--accent); color: #fff; }
        .search-bar { padding: 10px 16px; position: relative; }
        .search-bar input {
            width: 100%; padding: 11px 16px 11px 40px; background: var(--bg-input);
            border: 2px solid transparent; border-radius: 25px; color: var(--text-primary);
            outline: none;
        }
        .search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .chat-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
        .chat-item {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
        }
        .chat-item:hover { background: rgba(139,92,246,0.1); }
        .chat-item.active { background: rgba(139,92,246,0.2); }
        .chat-avatar {
            width: 46px; height: 46px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: 700; color: #fff;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; }
        .chat-last-msg { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); }
        .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); flex-direction: column; }
        .chat-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; background: var(--bg-sidebar);
        }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
        .message {
            max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 14px;
            animation: msgIn 0.3s;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.own { align-self: flex-end; background: var(--bg-message-own); color: #fff; }
        .message.other { align-self: flex-start; background: var(--bg-message-other); }
        .message-input-area {
            padding: 14px 18px; border-top: 1px solid var(--border);
            display: flex; gap: 10px; background: var(--bg-sidebar);
        }
        .message-input-area input {
            flex: 1; padding: 12px 18px; background: var(--bg-input);
            border: 2px solid transparent; border-radius: 25px; color: var(--text-primary); outline: none;
        }
        .send-btn {
            width: 44px; height: 44px; border-radius: 50%; background: var(--gradient-accent);
            border: none; color: #fff; font-size: 20px; cursor: pointer;
        }
        .settings-panel {
            position: absolute; top: 0; right: -420px; width: 400px; max-width: 90vw;
            height: 100vh; background: var(--bg-sidebar); border-left: 1px solid var(--border);
            z-index: 50; transition: right 0.35s; display: flex; flex-direction: column;
        }
        .settings-panel.open { right: 0; }
        .settings-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .settings-body { flex: 1; overflow-y: auto; padding: 16px; }
        .settings-card { background: var(--bg-input); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; }
        .settings-card label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .settings-card input, .settings-card textarea {
            width: 100%; padding: 8px 0; background: transparent; border: none;
            border-bottom: 2px solid var(--border); color: var(--text-primary); outline: none;
        }
        .color-palette { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .color-dot {
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: var(--transition);
        }
        .color-dot.selected { border-color: #fff; }
        .add-friend-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150;
            display: flex; align-items: center; justify-content: center;
        }
        .add-friend-modal.hidden { display: none; }
        .add-friend-card {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 20px; padding: 28px; width: 400px; max-width: 90vw; text-align: center;
        }
        .hidden { display: none !important; }
        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 100%; z-index: 20; }
            .chat-area { position: absolute; inset: 0; z-index: 15; }
            .chat-area.shifted { z-index: 25; }
            .settings-panel { width: 100%; right: -100%; }
            .back-btn-mobile { display: flex !important; }
        }
        .back-btn-mobile {
            display: none; width: 32px; height: 32px; border-radius: 50%;
            background: var(--bg-input); border: none; cursor: pointer;
            align-items: center; justify-content: center; color: var(--text-secondary);
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <!-- АВТОРИЗАЦИЯ -->
    <div class="auth-container" id="authContainer">
        <div class="auth-card">
            <div class="auth-logo">💜</div>
            <div class="auth-title">Доверие</div>
            <div class="auth-subtitle">Безопасный мессенджер</div>
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin">Вход</button>
                <button class="auth-tab" id="tabRegister">Регистрация</button>
            </div>
            <form class="auth-form active" id="loginForm" autocomplete="off">
                <div class="input-group"><label>👤 Никнейм</label><input type="text" id="loginNick" required></div>
                <div class="input-group"><label>📧 Email</label><input type="email" id="loginEmail" required></div>
                <div class="input-group"><label>🔒 Пароль</label><input type="password" id="loginPassword" required></div>
                <div class="auth-error" id="loginError"></div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            <form class="auth-form" id="registerForm" autocomplete="off">
                <div class="input-group"><label>👤 Никнейм</label><input type="text" id="regNick" required minlength="3"></div>
                <div class="input-group"><label>📧 Email</label><input type="email" id="regEmail" required></div>
                <div class="input-group"><label>🔒 Пароль</label><input type="password" id="regPassword" required minlength="4"></div>
                <div class="input-group"><label>🔒 Повторите пароль</label><input type="password" id="regPassword2" required minlength="4"></div>
                <div class="auth-error" id="regError"></div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div class="app-container" id="appContainer">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info" id="currentUserInfo">
                    <div class="avatar" id="sidebarAvatar">?</div>
                    <div>
                        <div class="user-name" id="sidebarNick">Пользователь</div>
                        <div class="user-status" id="sidebarStatus">В сети</div>
                    </div>
                </div>
                <button class="icon-btn" id="btnAddFriend">➕</button>
                <button class="icon-btn" id="btnSettings">⚙️</button>
            </div>
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchChats" placeholder="Поиск чатов...">
            </div>
            <div class="chat-list" id="chatList">
                <div style="text-align:center;color:var(--text-muted);padding:40px;">
                    <div style="font-size:48px;">💬</div>
                    <p>У вас пока нет чатов</p>
                </div>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty-chat" id="emptyChat">
                <div style="font-size:80px;opacity:0.5;">💜</div>
                <h3>Добро пожаловать в Доверие</h3>
                <p>Выберите чат слева или добавьте друга</p>
            </div>
            <div class="chat-header hidden" id="chatHeader">
                <button class="back-btn-mobile" id="btnBackMobile">←</button>
                <div class="chat-avatar" id="chatPartnerAvatar" style="background:#7c3aed;">?</div>
                <div>
                    <div class="chat-partner-name" id="chatPartnerName"></div>
                    <div class="chat-partner-status" id="chatPartnerStatus"></div>
                </div>
            </div>
            <div class="messages-container hidden" id="messagesContainer"></div>
            <div class="message-input-area hidden" id="messageInputArea">
                <input type="text" id="messageInput" placeholder="Напишите сообщение...">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>

        <!-- ПАНЕЛЬ НАСТРОЕК -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3>⚙️ Настройки</h3>
                <button class="icon-btn" id="btnCloseSettings">✕</button>
            </div>
            <div class="settings-body">
                <div class="settings-card" style="text-align:center;">
                    <div class="avatar" id="settingsAvatarPreview" style="width:70px;height:70px;font-size:28px;margin:0 auto;">?</div>
                    <p style="font-size:12px;color:var(--text-muted);margin-top:8px;">Цвет аватара</p>
                    <div class="color-palette" id="colorPalette">
                        <span class="color-dot selected" style="background:#7c3aed;" data-color="#7c3aed"></span>
                        <span class="color-dot" style="background:#a855f7;" data-color="#a855f7"></span>
                        <span class="color-dot" style="background:#6366f1;" data-color="#6366f1"></span>
                        <span class="color-dot" style="background:#ec4899;" data-color="#ec4899"></span>
                        <span class="color-dot" style="background:#f43f5e;" data-color="#f43f5e"></span>
                        <span class="color-dot" style="background:#14b8a6;" data-color="#14b8a6"></span>
                        <span class="color-dot" style="background:#f59e0b;" data-color="#f59e0b"></span>
                        <span class="color-dot" style="background:#3b82f6;" data-color="#3b82f6"></span>
                    </div>
                </div>
                <div class="settings-card"><label>Никнейм</label><input type="text" id="settingsNick"></div>
                <div class="settings-card"><label>Статус</label><input type="text" id="settingsStatus"></div>
                <div class="settings-card"><label>О себе</label><textarea id="settingsBio"></textarea></div>
                <div class="settings-card"><label>Email</label><input type="email" id="settingsEmail"></div>
                <div class="settings-card"><label>Новый пароль</label><input type="password" id="settingsNewPassword" placeholder="Не менять"></div>
                <button class="btn btn-primary" id="btnSaveSettings" style="width:100%;margin-top:8px;">💾 Сохранить</button>
                <button class="btn btn-outline" id="btnLogout" style="width:100%;margin-top:8px;border-color:var(--danger);color:var(--danger);">🚪 Выйти</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ДОБАВЛЕНИЯ ДРУГА -->
    <div class="add-friend-modal hidden" id="addFriendModal">
        <div class="add-friend-card">
            <h3>➕ Добавить друга</h3>
            <p style="color:var(--text-secondary);margin:10px 0;">Введите никнейм пользователя</p>
            <div class="input-group" style="margin-bottom:12px;">
                <input type="text" id="friendNickInput" placeholder="Никнейм друга">
            </div>
            <div class="auth-error" id="addFriendError"></div>
            <div class="auth-success" id="addFriendSuccess"></div>
            <button class="btn btn-primary" id="btnConfirmAddFriend" style="width:100%;">Добавить</button>
            <button class="btn btn-outline btn-sm" id="btnCloseAddFriend" style="width:100%;margin-top:8px;">Отмена</button>
        </div>
    </div>

    <script>
        (function() {
            // ========== ХРАНИЛИЩЕ (localStorage как сервер) ==========
            const Server = {
                getUsers() {
                    return JSON.parse(localStorage.getItem('trust_users') || '[]');
                },
                saveUsers(users) {
                    localStorage.setItem('trust_users', JSON.stringify(users));
                },
                getMessages() {
                    return JSON.parse(localStorage.getItem('trust_messages') || '{}');
                },
                saveMessages(msgs) {
                    localStorage.setItem('trust_messages', JSON.stringify(msgs));
                },
                register(nick, email, password) {
                    const users = this.getUsers();
                    if (users.find(u => u.nick === nick)) throw new Error('Никнейм занят');
                    if (users.find(u => u.email === email)) throw new Error('Почта уже используется');
                    const user = { nick, email, password, avatarColor: '#7c3aed', status: 'В сети', bio: '', friends: [] };
                    users.push(user);
                    this.saveUsers(users);
                    return user;
                },
                login(nick, email, password) {
                    const users = this.getUsers();
                    const user = users.find(u => u.nick === nick && u.email === email && u.password === password);
                    if (!user) throw new Error('Неверные данные');
                    return user;
                },
                getUser(nick) {
                    return this.getUsers().find(u => u.nick === nick) || null;
                },
                updateUser(nick, data) {
                    const users = this.getUsers();
                    const idx = users.findIndex(u => u.nick === nick);
                    if (idx === -1) throw new Error('Пользователь не найден');
                    users[idx] = { ...users[idx], ...data };
                    this.saveUsers(users);
                    return users[idx];
                },
                addFriend(userNick, friendNick) {
                    const users = this.getUsers();
                    const user = users.find(u => u.nick === userNick);
                    const friend = users.find(u => u.nick === friendNick);
                    if (!user || !friend) throw new Error('Пользователь не найден');
                    if (!user.friends.includes(friendNick)) user.friends.push(friendNick);
                    if (!friend.friends.includes(userNick)) friend.friends.push(userNick);
                    this.saveUsers(users);
                },
                sendMessage(from, to, text) {
                    const msgs = this.getMessages();
                    const chatId = [from, to].sort().join('___');
                    if (!msgs[chatId]) msgs[chatId] = [];
                    msgs[chatId].push({ from, to, text, time: new Date().toISOString() });
                    this.saveMessages(msgs);
                    return msgs[chatId];
                },
                getChatMessages(user1, user2) {
                    return this.getMessages()[[user1, user2].sort().join('___')] || [];
                },
                getAllChatsForUser(nick) {
                    const msgs = this.getMessages();
                    const users = this.getUsers();
                    const chats = [];
                    const processed = new Set();
                    for (const [chatId, messages] of Object.entries(msgs)) {
                        const parts = chatId.split('___');
                        if (parts.includes(nick) && messages.length > 0) {
                            const partner = parts[0] === nick ? parts[1] : parts[0];
                            processed.add(partner);
                            chats.push({ partner, lastMsg: messages[messages.length-1].text, time: messages[messages.length-1].time });
                        }
                    }
                    const user = users.find(u => u.nick === nick);
                    if (user?.friends) {
                        for (const friend of user.friends) {
                            if (!processed.has(friend)) chats.push({ partner: friend, lastMsg: 'Начните общение!', time: '' });
                        }
                    }
                    return chats;
                }
            };

            // ========== ИНТЕРФЕЙС ==========
            let currentUser = null;
            let activeChatPartner = null;
            let refreshInterval = null;

            const $ = id => document.getElementById(id);
            const authContainer = $('authContainer');
            const appContainer = $('appContainer');
            const tabLogin = $('tabLogin');
            const tabRegister = $('tabRegister');
            const loginForm = $('loginForm');
            const registerForm = $('registerForm');
            const loginError = $('loginError');
            const regError = $('regError');
            const chatList = $('chatList');
            const emptyChat = $('emptyChat');
            const chatHeader = $('chatHeader');
            const messagesContainer = $('messagesContainer');
            const messageInputArea = $('messageInputArea');
            const messageInput = $('messageInput');
            const sendBtn = $('sendBtn');
            const searchChats = $('searchChats');
            const btnAddFriend = $('btnAddFriend');
            const btnSettings = $('btnSettings');
            const settingsPanel = $('settingsPanel');
            const btnCloseSettings = $('btnCloseSettings');
            const btnSaveSettings = $('btnSaveSettings');
            const btnLogout = $('btnLogout');
            const addFriendModal = $('addFriendModal');
            const friendNickInput = $('friendNickInput');
            const btnConfirmAddFriend = $('btnConfirmAddFriend');
            const btnCloseAddFriend = $('btnCloseAddFriend');
            const addFriendError = $('addFriendError');
            const addFriendSuccess = $('addFriendSuccess');
            const btnBackMobile = $('btnBackMobile');
            const currentUserInfo = $('currentUserInfo');

            function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
            function formatTime(iso) {
                try {
                    const d = new Date(iso), now = new Date();
                    return d.toDateString() === now.toDateString() ? d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : d.toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
                } catch(e) { return ''; }
            }

            // Переключение вкладок
            tabLogin.onclick = () => {
                tabLogin.classList.add('active'); tabRegister.classList.remove('active');
                loginForm.classList.add('active'); registerForm.classList.remove('active');
                loginError.textContent = ''; regError.textContent = '';
            };
            tabRegister.onclick = () => {
                tabRegister.classList.add('active'); tabLogin.classList.remove('active');
                registerForm.classList.add('active'); loginForm.classList.remove('active');
                loginError.textContent = ''; regError.textContent = '';
            };

            // Регистрация
            registerForm.onsubmit = (e) => {
                e.preventDefault();
                regError.textContent = '';
                const nick = $('regNick').value.trim();
                const email = $('regEmail').value.trim();
                const pass = $('regPassword').value;
                const pass2 = $('regPassword2').value;
                if (!nick || !email || !pass) return regError.textContent = 'Заполните все поля';
                if (nick.length < 3) return regError.textContent = 'Никнейм от 3 символов';
                if (pass.length < 4) return regError.textContent = 'Пароль от 4 символов';
                if (pass !== pass2) return regError.textContent = 'Пароли не совпадают';
                try {
                    currentUser = Server.register(nick, email, pass);
                    showApp();
                } catch(err) { regError.textContent = err.message; }
            };

            // Вход
            loginForm.onsubmit = (e) => {
                e.preventDefault();
                loginError.textContent = '';
                const nick = $('loginNick').value.trim();
                const email = $('loginEmail').value.trim();
                const pass = $('loginPassword').value;
                if (!nick || !email || !pass) return loginError.textContent = 'Заполните все поля';
                try {
                    currentUser = Server.login(nick, email, pass);
                    showApp();
                } catch(err) { loginError.textContent = err.message; }
            };

            function showApp() {
                authContainer.classList.add('hidden');
                appContainer.classList.add('visible');
                localStorage.setItem('trust_current', currentUser.nick);
                loadProfile();
                refreshChatList();
                startRefreshInterval();
            }

            function loadProfile() {
                if (!currentUser) return;
                $('sidebarAvatar').style.background = currentUser.avatarColor;
                $('sidebarAvatar').textContent = currentUser.nick[0].toUpperCase();
                $('sidebarNick').textContent = currentUser.nick;
                $('sidebarStatus').textContent = currentUser.status;
                $('settingsNick').value = currentUser.nick;
                $('settingsStatus').value = currentUser.status;
                $('settingsBio').value = currentUser.bio || '';
                $('settingsEmail').value = currentUser.email;
                $('settingsAvatarPreview').style.background = currentUser.avatarColor;
                $('settingsAvatarPreview').textContent = currentUser.nick[0].toUpperCase();
                document.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('selected', d.dataset.color === currentUser.avatarColor));
            }

            function refreshChatList(filter = '') {
                if (!currentUser) return;
                const chats = Server.getAllChatsForUser(currentUser.nick);
                const filtered = chats.filter(c => c.partner.toLowerCase().includes(filter.toLowerCase()));
                filtered.sort((a,b) => b.time && a.time ? new Date(b.time) - new Date(a.time) : b.time ? 1 : -1);
                chatList.innerHTML = filtered.length === 0 ? 
                    `<div style="text-align:center;color:var(--text-muted);padding:40px;"><div style="font-size:48px;">💬</div><p>Нет чатов</p></div>` :
                    filtered.map(c => {
                        const friend = Server.getUser(c.partner);
                        const color = friend?.avatarColor || '#7c3aed';
                        return `<div class="chat-item ${activeChatPartner===c.partner?'active':''}" data-partner="${c.partner}">
                            <div class="chat-avatar" style="background:${color}">${c.partner[0].toUpperCase()}</div>
                            <div class="chat-info"><div class="chat-name">${escapeHtml(c.partner)}</div>
                            <div class="chat-last-msg">${escapeHtml(c.lastMsg?.slice(0,30) || '')}</div></div>
                            <div style="font-size:11px;color:var(--text-muted);">${c.time?formatTime(c.time):''}</div>
                        </div>`;
                    }).join('');
                document.querySelectorAll('.chat-item').forEach(el => el.onclick = () => openChat(el.dataset.partner));
            }

            function openChat(partner) {
                activeChatPartner = partner;
                emptyChat.classList.add('hidden'); chatHeader.classList.remove('hidden');
                messagesContainer.classList.remove('hidden'); messageInputArea.classList.remove('hidden');
                const friend = Server.getUser(partner);
                $('chatPartnerAvatar').style.background = friend?.avatarColor || '#7c3aed';
                $('chatPartnerAvatar').textContent = partner[0].toUpperCase();
                $('chatPartnerName').textContent = partner;
                $('chatPartnerStatus').textContent = friend?.status || 'В сети';
                renderMessages();
                messageInput.focus();
                refreshChatList(searchChats.value);
                if (window.innerWidth <= 768) $('chatArea').classList.add('shifted');
            }

            function renderMessages() {
                if (!currentUser || !activeChatPartner) return;
                const msgs = Server.getChatMessages(currentUser.nick, activeChatPartner);
                messagesContainer.innerHTML = msgs.length === 0 ? 
                    '<div style="text-align:center;color:var(--text-muted);padding:40px;">💜 Начните переписку!</div>' :
                    msgs.map(m => `<div class="message ${m.from===currentUser.nick?'own':'other'}">
                        ${escapeHtml(m.text)}<div style="font-size:10px;opacity:0.7;margin-top:4px;text-align:right;">${formatTime(m.time)}</div>
                    </div>`).join('');
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            sendBtn.onclick = () => {
                const text = messageInput.value.trim();
                if (!text || !currentUser || !activeChatPartner) return;
                Server.sendMessage(currentUser.nick, activeChatPartner, text);
                messageInput.value = '';
                renderMessages();
                refreshChatList(searchChats.value);
            };
            messageInput.onkeydown = (e) => { if (e.key === 'Enter') sendBtn.click(); };
            searchChats.oninput = () => refreshChatList(searchChats.value);

            btnAddFriend.onclick = () => { addFriendModal.classList.remove('hidden'); friendNickInput.value = ''; addFriendError.textContent = ''; addFriendSuccess.textContent = ''; };
            btnCloseAddFriend.onclick = () => addFriendModal.classList.add('hidden');
            btnConfirmAddFriend.onclick = () => {
                const nick = friendNickInput.value.trim();
                if (!nick) return addFriendError.textContent = 'Введите никнейм';
                if (nick === currentUser.nick) return addFriendError.textContent = 'Нельзя добавить себя';
                try {
                    Server.addFriend(currentUser.nick, nick);
                    addFriendSuccess.textContent = '✅ Добавлен!';
                    refreshChatList();
                    setTimeout(() => addFriendModal.classList.add('hidden'), 1000);
                } catch(e) { addFriendError.textContent = e.message; }
            };

            btnSettings.onclick = () => { loadProfile(); settingsPanel.classList.add('open'); };
            btnCloseSettings.onclick = () => settingsPanel.classList.remove('open');
            currentUserInfo.onclick = () => { loadProfile(); settingsPanel.classList.add('open'); };

            document.getElementById('colorPalette').onclick = (e) => {
                const dot = e.target.closest('.color-dot');
                if (!dot || !currentUser) return;
                currentUser.avatarColor = dot.dataset.color;
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
                dot.classList.add('selected');
                $('settingsAvatarPreview').style.background = dot.dataset.color;
            };

            btnSaveSettings.onclick = () => {
                if (!currentUser) return;
                const data = {
                    avatarColor: currentUser.avatarColor,
                    status: $('settingsStatus').value.trim() || 'В сети',
                    bio: $('settingsBio').value.trim(),
                    email: $('settingsEmail').value.trim() || currentUser.email,
                };
                const newPass = $('settingsNewPassword').value;
                if (newPass.length >= 4) data.password = newPass;
                const newNick = $('settingsNick').value.trim();
                if (newNick && newNick !== currentUser.nick) {
                    if (Server.getUser(newNick)) return alert('Никнейм занят');
                    data.nick = newNick;
                }
                Server.updateUser(currentUser.nick, data);
                currentUser = Server.getUser(data.nick || currentUser.nick);
                localStorage.setItem('trust_current', currentUser.nick);
                loadProfile();
                refreshChatList();
                settingsPanel.classList.remove('open');
            };

            btnLogout.onclick = () => {
                localStorage.removeItem('trust_current');
                currentUser = null; activeChatPartner = null;
                stopRefreshInterval();
                appContainer.classList.remove('visible');
                authContainer.classList.remove('hidden');
            };

            btnBackMobile.onclick = () => $('chatArea').classList.remove('shifted');

            function startRefreshInterval() {
                stopRefreshInterval();
                refreshInterval = setInterval(() => {
                    if (currentUser) {
                        currentUser = Server.getUser(currentUser.nick);
                        refreshChatList(searchChats.value);
                        if (activeChatPartner) renderMessages();
                    }
                }, 2000);
            }
            function stopRefreshInterval() { if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; } }

            // Автовход
            const saved = localStorage.getItem('trust_current');
            if (saved) {
                currentUser = Server.getUser(saved);
                if (currentUser) showApp();
            }
        })();
    </script>
</body>
</html>
