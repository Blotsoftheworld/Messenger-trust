<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доверие - Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0088cc;
            --primary-dark: #0066a0;
            --secondary: #25d366;
            --danger: #ff4757;
            --bg-dark: #0b141a;
            --bg-sidebar: #1a2a32;
            --bg-chat: #0e1a22;
            --bg-message-own: #0088cc;
            --bg-message-other: #1e3a4a;
            --text-light: #e9edef;
            --text-gray: #8696a0;
            --border-color: #2a3942;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* Screens */
        .screen {
            display: none;
            height: 100vh;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        /* Loading */
        #loadingScreen {
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            background: var(--bg-dark);
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Auth Screen */
        #authScreen {
            background: linear-gradient(135deg, #0b141a 0%, #1a2a32 100%);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            background: var(--bg-sidebar);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 56px;
            margin-bottom: 8px;
            display: block;
        }

        .auth-logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #0088cc, #25d366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-logo p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-dark);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-gray);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .auth-tab.active {
            background: var(--primary);
            color: white;
        }

        .auth-tab:hover:not(.active) {
            color: var(--text-light);
        }

        .auth-form {
            display: none;
            gap: 16px;
            flex-direction: column;
        }

        .auth-form.active {
            display: flex;
        }

        .form-group {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--bg-dark);
            color: var(--text-light);
            font-size: 15px;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 136, 204, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-gray);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 136, 204, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .auth-error {
            color: var(--danger);
            text-align: center;
            font-size: 14px;
            margin-top: 12px;
            min-height: 20px;
        }

        /* Chat Screen */
        #chatScreen {
            background: var(--bg-dark);
        }

        /* Sidebar */
        .sidebar {
            width: 380px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .sidebar-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: var(--primary);
            flex-shrink: 0;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-weight: 600;
            font-size: 16px;
        }

        .status-text {
            font-size: 12px;
            color: var(--secondary);
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            font-size: 18px;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
        }

        .search-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-bar input {
            width: 100%;
            padding: 10px 16px;
            border: none;
            border-radius: 20px;
            background: var(--bg-dark);
            color: var(--text-light);
            font-size: 14px;
        }

        .search-bar input::placeholder {
            color: var(--text-gray);
        }

        .search-bar input:focus {
            outline: none;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            border-radius: 8px;
            margin: 0 8px;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-item .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: var(--primary);
            flex-shrink: 0;
        }

        .user-item .user-name {
            font-weight: 500;
            flex: 1;
        }

        .user-item .user-status {
            font-size: 12px;
            color: var(--text-gray);
        }

        .user-item .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--secondary);
            flex-shrink: 0;
        }

        .user-item .offline-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-gray);
            flex-shrink: 0;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            position: relative;
        }

        .chat-header {
            padding: 16px 24px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-user-name {
            font-weight: 600;
            font-size: 16px;
        }

        .chat-user-status {
            font-size: 12px;
            color: var(--text-gray);
        }

        /* Messages */
        .messages {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 136, 204, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(37, 211, 102, 0.03) 0%, transparent 50%);
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 65%;
            animation: messageSlide 0.2s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-wrapper.own {
            align-self: flex-end;
        }

        .message-wrapper.other {
            align-self: flex-start;
        }

        .message-wrapper.system {
            align-self: center;
            max-width: 100%;
        }

        .message {
            padding: 10px 14px;
            border-radius: var(--radius);
            word-wrap: break-word;
            position: relative;
        }

        .message-wrapper.own .message {
            background: var(--primary);
            border-bottom-right-radius: 4px;
        }

        .message-wrapper.other .message {
            background: var(--bg-message-other);
            border-bottom-left-radius: 4px;
        }

        .message-wrapper.system .message {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-gray);
            font-size: 13px;
            text-align: center;
            padding: 6px 16px;
        }

        .message .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .message .message-header .sender-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            background: var(--primary);
        }

        .message .message-header .sender-name {
            font-weight: 600;
            color: var(--text-gray);
        }

        .message-wrapper.own .message .message-header .sender-name {
            color: rgba(255, 255, 255, 0.8);
        }

        .message .message-body {
            font-size: 15px;
            line-height: 1.5;
        }

        .message .message-time {
            font-size: 11px;
            color: var(--text-gray);
            margin-top: 4px;
            text-align: right;
        }

        .message-wrapper.own .message .message-time {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Chat Input */
        .chat-input-wrapper {
            padding: 12px 20px;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border-color);
        }

        .chat-input-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-dark);
            border-radius: 25px;
            padding: 4px;
        }

        .chat-icon-btn {
            background: none;
            border: none;
            color: var(--text-gray);
            padding: 8px 12px;
            font-size: 22px;
            cursor: pointer;
            transition: var(--transition);
        }

        .chat-icon-btn:hover {
            color: var(--text-light);
        }

        .chat-input-container input {
            flex: 1;
            background: none;
            border: none;
            padding: 10px 4px;
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            min-width: 0;
        }

        .chat-input-container input::placeholder {
            color: var(--text-gray);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 12px rgba(0, 136, 204, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            padding: 4px 24px;
            font-size: 13px;
            color: var(--text-gray);
            min-height: 24px;
        }

        /* Mobile Toggle */
        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
                z-index: 10;
                transform: translateX(0);
                transition: transform 0.3s ease;
            }

            .sidebar.hidden {
                transform: translateX(-100%);
            }

            .sidebar-toggle {
                display: block;
            }

            .chat-container {
                width: 100%;
            }

            .message-wrapper {
                max-width: 85%;
            }

            .auth-container {
                padding: 32px 20px;
                margin: 10px;
            }

            .chat-header {
                padding: 12px 16px;
            }

            .messages {
                padding: 16px;
            }

            .chat-input-wrapper {
                padding: 8px 12px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-gray);
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-sidebar);
            color: var(--text-light);
            padding: 16px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="screen active">
        <div class="loader"></div>
        <div style="text-align:center;">
            <h2 style="color:var(--text-light);">🤝 Доверие</h2>
            <p style="color:var(--text-gray);">Подключение к GitHub...</p>
        </div>
    </div>

    <!-- Auth Screen -->
    <div id="authScreen" class="screen">
        <div class="auth-container">
            <div class="auth-logo">
                <span class="logo-icon">🤝</span>
                <h1>Доверие</h1>
                <p>Безопасный мессенджер</p>
                <p style="font-size:11px;color:var(--text-gray);margin-top:4px;">📦 Данные хранятся в GitHub</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Вход</button>
                <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Регистрация</button>
            </div>
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="Имя пользователя" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn-primary">Войти</button>
            </form>
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <input type="text" id="registerUsername" placeholder="Имя пользователя" required>
                </div>
                <div class="form-group">
                    <input type="email" id="registerEmail" placeholder="Email (опционально)">
                </div>
                <div class="form-group">
                    <input type="password" id="registerPassword" placeholder="Пароль" required>
                </div>
                <div class="form-group">
                    <input type="password" id="registerConfirmPassword" placeholder="Подтвердите пароль" required>
                </div>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>
            <div id="authError" class="auth-error"></div>
            <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-gray);">
                <span id="connectionStatus">🔄 Подключение к GitHub...</span>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="screen">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="avatar" id="currentUserAvatar">👤</div>
                    <div class="user-details">
                        <span class="username" id="currentUsername">User</span>
                        <span class="status-text">🟢 В сети</span>
                    </div>
                </div>
                <div style="display:flex;gap:4px;">
                    <button class="icon-btn" onclick="refreshData()" title="Обновить">🔄</button>
                    <button class="icon-btn" onclick="logout()" title="Выйти">🚪</button>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Поиск..." id="searchInput" oninput="filterUsers(this.value)">
            </div>
            <div class="users-list" id="usersList">
                <!-- Users will be rendered here -->
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container">
            <div class="chat-header">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                    <div class="chat-user-info">
                        <div class="chat-user-avatar">💬</div>
                        <div>
                            <div class="chat-user-name">Общий чат</div>
                            <div class="chat-user-status" id="onlineCount">0 пользователей онлайн</div>
                        </div>
                    </div>
                </div>
                <div style="display:flex;gap:4px;align-items:center;">
                    <span id="syncStatus" style="font-size:12px;color:var(--text-gray);">✅ Синхронизировано</span>
                </div>
            </div>
            <div class="messages" id="messages">
                <!-- Messages will be rendered here -->
            </div>
            <div id="typingIndicator" class="typing-indicator"></div>
            <div class="chat-input-wrapper">
                <div class="chat-input-container">
                    <button class="chat-icon-btn" onclick="insertEmoji()">😊</button>
                    <input type="text" placeholder="Введите сообщение..." id="messageInput" onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // GITHUB API CONFIGURATION
        // ============================================
        // ⚠️ ИЗМЕНИТЕ ЭТИ НАСТРОЙКИ НА СВОИ!
        const GITHUB_CONFIG = {
            owner: 'YOUR_USERNAME',        // Ваше имя пользователя GitHub
            repo: 'trust-messenger-data',  // Название репозитория
            path: 'data.json',              // Путь к файлу с данными
            token: 'YOUR_GITHUB_TOKEN'      // Ваш GitHub Personal Access Token
        };

        // ============================================
        // DATA STORAGE CLASS
        // ============================================
        class GitHubStorage {
            constructor() {
                this.cache = null;
                this.sha = null;
                this.isConnected = false;
                this.lastSync = null;
                this.retryCount = 0;
                this.maxRetries = 3;
            }

            async init() {
                try {
                    await this.loadData();
                    this.isConnected = true;
                    this.updateConnectionStatus(true);
                    return true;
                } catch (error) {
                    console.error('GitHub connection error:', error);
                    this.isConnected = false;
                    this.updateConnectionStatus(false);
                    return false;
                }
            }

            async loadData() {
                try {
                    const response = await fetch(
                        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
                        {
                            headers: {
                                'Authorization': `token ${GITHUB_CONFIG.token}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        }
                    );

                    if (response.status === 404) {
                        // File doesn't exist, create default
                        const defaultData = this.getDefaultData();
                        await this.saveData(defaultData);
                        this.cache = defaultData;
                        return defaultData;
                    }

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    this.sha = data.sha;
                    const content = atob(data.content);
                    this.cache = JSON.parse(content);
                    this.lastSync = new Date();
                    return this.cache;
                } catch (error) {
                    // Если файл не найден, создаём новый
                    if (error.message.includes('404')) {
                        const defaultData = this.getDefaultData();
                        await this.saveData(defaultData);
                        this.cache = defaultData;
                        return defaultData;
                    }
                    throw error;
                }
            }

            async saveData(data) {
                try {
                    const content = btoa(JSON.stringify(data, null, 2));
                    const body = {
                        message: `Update data ${new Date().toISOString()}`,
                        content: content,
                        sha: this.sha || undefined
                    };

                    const response = await fetch(
                        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
                        {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${GITHUB_CONFIG.token}`,
                                'Content-Type': 'application/json',
                                'Accept': 'application/vnd.github.v3+json'
                            },
                            body: JSON.stringify(body)
                        }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const result = await response.json();
                    this.sha = result.content.sha;
                    this.cache = data;
                    this.lastSync = new Date();
                    this.updateSyncStatus(true);
                    return true;
                } catch (error) {
                    console.error('Save error:', error);
                    this.updateSyncStatus(false);
                    throw error;
                }
            }

            getDefaultData() {
                return {
                    users: [
                        { id: 1, name: 'Admin', email: 'admin@trust.com', password: 'admin123', avatar: '👤', online: true, createdAt: new Date().toISOString() },
                        { id: 2, name: 'John', email: 'john@trust.com', password: '123456', avatar: '👨', online: false, createdAt: new Date().toISOString() },
                        { id: 3, name: 'Mary', email: 'mary@trust.com', password: '123456', avatar: '👩', online: true, createdAt: new Date().toISOString() }
                    ],
                    messages: [
                        { id: 1, sender: 'Admin', text: 'Добро пожаловать в мессенджер "Доверие"! 🤝', timestamp: new Date().toISOString() },
                        { id: 2, sender: 'John', text: 'Привет всем! 👋', timestamp: new Date(Date.now() - 60000).toISOString() },
                        { id: 3, sender: 'Mary', text: 'Здравствуйте! Как дела? 😊', timestamp: new Date(Date.now() - 30000).toISOString() }
                    ],
                    nextUserId: 4,
                    nextMsgId: 4
                };
            }

            getUsers() {
                return this.cache?.users || [];
            }

            getMessages() {
                return this.cache?.messages || [];
            }

            getUser(name) {
                return this.cache?.users.find(u => u.name.toLowerCase() === name.toLowerCase());
            }

            async addUser(name, email, password) {
                if (this.getUser(name)) return null;
                
                const user = {
                    id: this.cache.nextUserId++,
                    name,
                    email: email || '',
                    password: password || '123456',
                    avatar: this.getRandomAvatar(),
                    online: true,
                    createdAt: new Date().toISOString()
                };
                
                this.cache.users.push(user);
                await this.saveData(this.cache);
                return user;
            }

            async removeUser(id) {
                this.cache.users = this.cache.users.filter(u => u.id !== id);
                await this.saveData(this.cache);
            }

            async addMessage(sender, text) {
                const msg = {
                    id: this.cache.nextMsgId++,
                    sender,
                    text,
                    timestamp: new Date().toISOString()
                };
                this.cache.messages.push(msg);
                await this.saveData(this.cache);
                return msg;
            }

            async removeMessage(id) {
                this.cache.messages = this.cache.messages.filter(m => m.id !== id);
                await this.saveData(this.cache);
            }

            async clearMessages() {
                this.cache.messages = [];
                this.cache.nextMsgId = 1;
                await this.saveData(this.cache);
            }

            getRandomAvatar() {
                const avatars = ['👤', '👨', '👩', '🧑', '👨‍💻', '👩‍💻', '👨‍🎤', '👩‍🎤', '🦊', '🐱', '🐶', '🐼', '🌟', '🌈', '⭐', '🔥'];
                return avatars[Math.floor(Math.random() * avatars.length)];
            }

            async toggleUserOnline(id) {
                const user = this.cache.users.find(u => u.id === id);
                if (user) {
                    user.online = !user.online;
                    await this.saveData(this.cache);
                }
            }

            async setUserOnline(name, status) {
                const user = this.getUser(name);
                if (user) {
                    user.online = status;
                    await this.saveData(this.cache);
                }
            }

            getOnlineUsers() {
                return this.cache?.users.filter(u => u.online) || [];
            }

            getOnlineCount() {
                return this.getOnlineUsers().length;
            }

            async login(name, password) {
                const user = this.getUser(name);
                if (!user) return { success: false, error: 'Пользователь не найден' };
                if (user.password !== password) return { success: false, error: 'Неверный пароль' };
                
                await this.setUserOnline(name, true);
                return { success: true, user };
            }

            async register(name, email, password) {
                if (this.getUser(name)) {
                    return { success: false, error: 'Пользователь уже существует' };
                }
                const user = await this.addUser(name, email, password);
                if (!user) return { success: false, error: 'Ошибка регистрации' };
                return { success: true, user };
            }

            async logout(name) {
                await this.setUserOnline(name, false);
            }

            updateConnectionStatus(connected) {
                const statusEl = document.getElementById('connectionStatus');
                if (statusEl) {
                    statusEl.textContent = connected ? '✅ Подключено к GitHub' : '❌ Нет подключения к GitHub';
                    statusEl.style.color = connected ? 'var(--secondary)' : 'var(--danger)';
                }
            }

            updateSyncStatus(success) {
                const statusEl = document.getElementById('syncStatus');
                if (statusEl) {
                    statusEl.textContent = success ? '✅ Синхронизировано' : '⏳ Синхронизация...';
                    statusEl.style.color = success ? 'var(--secondary)' : 'var(--text-gray)';
                }
            }

            async sync() {
                try {
                    await this.loadData();
                    this.updateSyncStatus(true);
                    return true;
                } catch {
                    this.updateSyncStatus(false);
                    return false;
                }
            }
        }

        // ============================================
        // MAIN APPLICATION
        // ============================================
        const storage = new GitHubStorage();
        let currentUser = null;
        let currentUserData = null;
        let syncInterval = null;

        // DOM Elements
        const loadingScreen = document.getElementById('loadingScreen');
        const authScreen = document.getElementById('authScreen');
        const chatScreen = document.getElementById('chatScreen');
        const authError = document.getElementById('authError');
        const messagesContainer = document.getElementById('messages');
        const usersList = document.getElementById('usersList');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const currentUsername = document.getElementById('currentUsername');
        const currentUserAvatar = document.getElementById('currentUserAvatar');
        const onlineCount = document.getElementById('onlineCount');

        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            try {
                // Show loading
                loadingScreen.classList.add('active');
                
                // Connect to GitHub
                const connected = await storage.init();
                
                if (!connected) {
                    // Try to load from localStorage as fallback
                    const localData = localStorage.getItem('trust_messenger_cache');
                    if (localData) {
                        try {
                            storage.cache = JSON.parse(localData);
                            console.log('📦 Using cached data from localStorage');
                        } catch {}
                    }
                }
                
                // Load saved session
                const savedSession = localStorage.getItem('trust_session');
                if (savedSession) {
                    try {
                        const session = JSON.parse(savedSession);
                        const result = await storage.login(session.name, session.password || '');
                        if (result.success) {
                            currentUser = result.user;
                            currentUserData = session;
                            showChatScreen();
                            loadingScreen.classList.remove('active');
                            return;
                        }
                    } catch {}
                }
                
                // Show auth screen
                loadingScreen.classList.remove('active');
                authScreen.classList.add('active');
                
                // Start auto-sync
                startAutoSync();
                
                console.log('🚀 Доверие мессенджер запущен!');
                console.log('👤 Пользователей:', storage.getUsers().length);
                console.log('💬 Сообщений:', storage.getMessages().length);
                console.log('🟢 Онлайн:', storage.getOnlineCount());
                
            } catch (error) {
                console.error('Init error:', error);
                loadingScreen.classList.remove('active');
                authScreen.classList.add('active');
                showAuthError('Ошибка подключения к GitHub. Проверьте настройки.');
            }
        }

        function startAutoSync() {
            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(async () => {
                if (currentUser) {
                    await storage.sync();
                    if (currentUser) {
                        renderUsers();
                        renderMessages();
                        updateOnlineCount();
                    }
                }
            }, 30000); // Sync every 30 seconds
        }

        // ============================================
        // AUTH FUNCTIONS
        // ============================================
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.auth-tab[data-tab="${tab}"]`).classList.add('active');
            
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.remove('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
            }
            
            authError.textContent = '';
        }

        function showAuthError(message) {
            authError.textContent = message;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!username || !password) {
                showAuthError('Заполните все поля');
                return;
            }
            
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = '⏳ Вход...';
            
            try {
                const result = await storage.login(username, password);
                if (result.success) {
                    currentUser = result.user;
                    currentUserData = { name: username, password: password };
                    localStorage.setItem('trust_session', JSON.stringify({ name: username, password: password }));
                    authError.textContent = '';
                    showChatScreen();
                } else {
                    showAuthError(result.error);
                }
            } catch (error) {
                showAuthError('Ошибка подключения к серверу');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirm = document.getElementById('registerConfirmPassword').value.trim();
            
            if (!username || !password || !confirm) {
                showAuthError('Заполните все обязательные поля');
                return;
            }
            
            if (password !== confirm) {
                showAuthError('Пароли не совпадают');
                return;
            }
            
            if (password.length < 4) {
                showAuthError('Пароль должен быть не менее 4 символов');
                return;
            }
            
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = '⏳ Регистрация...';
            
            try {
                const result = await storage.register(username, email, password);
                if (result.success) {
                    currentUser = result.user;
                    currentUserData = { name: username, password: password };
                    localStorage.setItem('trust_session', JSON.stringify({ name: username, password: password }));
                    authError.textContent = '';
                    showChatScreen();
                } else {
                    showAuthError(result.error);
                }
            } catch (error) {
                showAuthError('Ошибка подключения к серверу');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Зарегистрироваться';
            }
        }

        async function logout() {
            if (currentUser) {
                await storage.logout(currentUser.name);
                localStorage.removeItem('trust_session');
                currentUser = null;
                currentUserData = null;
                authScreen.classList.add('active');
                chatScreen.classList.remove('active');
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                authError.textContent = '';
                showNotification('👋 До свидания!');
            }
        }

        // ============================================
        // CHAT FUNCTIONS
        // ============================================
        function showChatScreen() {
            authScreen.classList.remove('active');
            chatScreen.classList.add('active');
            
            currentUsername.textContent = currentUser.name;
            currentUserAvatar.textContent = currentUser.avatar;
            
            renderUsers();
            renderMessages();
            updateOnlineCount();
            messageInput.focus();
            sendBtn.disabled = false;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;
            
            try {
                sendBtn.disabled = true;
                await storage.addMessage(currentUser.name, text);
                messageInput.value = '';
                renderMessages();
                scrollToBottom();
                showNotification('✅ Сообщение отправлено');
            } catch (error) {
                showNotification('❌ Ошибка отправки');
                console.error('Send error:', error);
            } finally {
                sendBtn.disabled = false;
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function renderMessages() {
            const messages = storage.getMessages();
            
            if (messages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="message-wrapper system">
                        <div class="message">💬 Начните общение! Отправьте первое сообщение</div>
                    </div>
                `;
                return;
            }
            
            messagesContainer.innerHTML = messages.map(msg => {
                const isOwn = currentUser && msg.sender.toLowerCase() === currentUser.name.toLowerCase();
                const user = storage.getUser(msg.sender);
                const avatar = user ? user.avatar : '👤';
                
                if (msg.sender === 'system') {
                    return `
                        <div class="message-wrapper system">
                            <div class="message">${msg.text}</div>
                        </div>
                    `;
                }
                
                return `
                    <div class="message-wrapper ${isOwn ? 'own' : 'other'}">
                        <div class="message">
                            <div class="message-header">
                                <span class="sender-avatar">${avatar}</span>
                                <span class="sender-name">${msg.sender}</span>
                            </div>
                            <div class="message-body">${msg.text}</div>
                            <div class="message-time">${formatTime(msg.timestamp)}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            scrollToBottom();
        }

        function renderUsers() {
            const users = storage.getUsers();
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = users.filter(u => 
                u.name.toLowerCase().includes(searchTerm) ||
                (u.email && u.email.toLowerCase().includes(searchTerm))
            );
            
            if (filtered.length === 0) {
                usersList.innerHTML = `
                    <div style="text-align:center;padding:40px 20px;color:var(--text-gray);">
                        <div style="font-size:32px;margin-bottom:8px;">🔍</div>
                        <p>Пользователи не найдены</p>
                    </div>
                `;
                return;
            }
            
            usersList.innerHTML = filtered.map(user => `
                <div class="user-item">
                    <div class="user-avatar">${user.avatar}</div>
                    <div class="user-name">${user.name}</div>
                    <div class="user-status">
                        ${user.online ? '🟢 Онлайн' : '⚫ Офлайн'}
                    </div>
                    <div class="${user.online ? 'online-dot' : 'offline-dot'}"></div>
                </div>
            `).join('');
        }

        function updateOnlineCount() {
            const count = storage.getOnlineCount();
            onlineCount.textContent = `${count} ${getDeclension(count, 'пользователь', 'пользователя', 'пользователей')} онлайн`;
        }

        function getDeclension(n, one, two, five) {
            n = Math.abs(n) % 100;
            const n1 = n % 10;
            if (n > 10 && n < 20) return five;
            if (n1 > 1 && n1 < 5) return two;
            if (n1 === 1) return one;
            return five;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 50);
        }

        function filterUsers(value) {
            renderUsers();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function insertEmoji() {
            const emojis = ['😊', '😄', '😍', '🤣', '😎', '👍', '👏', '🙌', '💪', '❤️', '🔥', '🌟', '💯', '🎉', '✨'];
            const random = emojis[Math.floor(Math.random() * emojis.length)];
            messageInput.value += random;
            messageInput.focus();
        }

        async function refreshData() {
            try {
                await storage.sync();
                if (currentUser) {
                    renderUsers();
                    renderMessages();
                    updateOnlineCount();
                    showNotification('🔄 Данные обновлены');
                }
            } catch (error) {
                showNotification('❌ Ошибка обновления');
            }
        }

        // ============================================
        // NOTIFICATION
        // ============================================
        function showNotification(message) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100px)';
                notification.style.transition = 'all 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ============================================
        // INITIALIZE
        // ============================================
        // Запускаем приложение
        init();

        // Handle errors globally
        window.addEventListener('error', (e) => {
            console.error('Global error:', e);
            showNotification('⚠️ Произошла ошибка. Попробуйте обновить страницу.');
        });

        console.log('📱 Доверие - Мессенджер с GitHub хранилищем');
        console.log('📖 Инструкция по настройке:');
        console.log('1. Создайте репозиторий на GitHub');
        console.log('2. Создайте Personal Access Token');
        console.log('3. Укажите данные в GITHUB_CONFIG');
        console.log('4. Загрузите файл на GitHub Pages или хостинг');
    </script>
</body>
</html>
