<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доверие — Мессенджер</title>
    <style>
        :root {
            --bg: #0f0619; --bg2: #1a0d2e; --bg3: #130924; --chat: #0d0418;
            --input: #1e1133; --msg-own: #7c3aed; --msg-other: #251840;
            --accent: #8b5cf6; --text: #e8e0f0; --text2: #b8a9d0;
            --text3: #7a6b90; --border: #2a1848; --red: #ef4444; --green: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #000; color: var(--text); height: 100vh; overflow: hidden; display: flex; }
        #auth { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #1a0d2e, #080311); z-index: 100; }
        #auth.hidden { display: none; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 380px; max-width: 95vw; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
        .card h1 { color: var(--accent); margin: 5px 0; font-size: 26px; }
        .card p { color: var(--text2); margin-bottom: 15px; font-size: 14px; }
        .tabs { display: flex; background: var(--bg); border-radius: 30px; padding: 3px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 8px; border: none; background: none; color: var(--text2); cursor: pointer; border-radius: 28px; font-weight: 600; font-size: 14px; }
        .tab.active { background: var(--accent); color: #fff; }
        .form { display: none; flex-direction: column; gap: 10px; }
        .form.active { display: flex; }
        input { padding: 10px; background: var(--input); border: 2px solid var(--border); border-radius: 8px; color: var(--text); outline: none; font-size: 14px; }
        input:focus { border-color: var(--accent); }
        .btn { padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn:hover { opacity: 0.9; }
        .error { color: var(--red); font-size: 12px; min-height: 16px; }
        .success { color: var(--green); font-size: 12px; }
        #app { display: flex; width: 100vw; height: 100vh; }
        #app.hidden { display: none; }
        .sidebar { width: 320px; background: var(--bg3); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .av { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 16px; }
        .chat-list { flex: 1; overflow-y: auto; padding: 5px; }
        .chat-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; }
        .chat-item:hover { background: rgba(139,92,246,0.1); }
        .chat-item.active { background: rgba(139,92,246,0.2); }
        .main { flex: 1; display: flex; flex-direction: column; background: var(--chat); }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 15px; font-size: 14px; word-wrap: break-word; }
        .msg.own { align-self: flex-end; background: var(--msg-own); color: #fff; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        .input-box { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--bg3); }
        .input-box input { flex: 1; border-radius: 20px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal.hidden { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="auth">
    <div class="card">
        <div style="font-size:40px;">💜</div>
        <h1>Доверие</h1>
        <p>Безопасный мессенджер</p>
        <div class="tabs">
            <button class="tab active" id="tabLogin">Вход</button>
            <button class="tab" id="tabReg">Регистрация</button>
        </div>
        <form class="form active" id="loginForm">
            <input id="lNick" placeholder="Никнейм" required>
            <input id="lEmail" type="email" placeholder="Email" required>
            <input id="lPass" type="password" placeholder="Пароль" required>
            <div class="error" id="loginErr"></div>
            <button type="submit" class="btn">Войти</button>
        </form>
        <form class="form" id="regForm">
            <input id="rNick" placeholder="Никнейм (минимум 3 символа)" required minlength="3">
            <input id="rEmail" type="email" placeholder="Email" required>
            <input id="rPass" type="password" placeholder="Пароль (минимум 4 символа)" required minlength="4">
            <input id="rPass2" type="password" placeholder="Повторите пароль" required>
            <div class="error" id="regErr"></div>
            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>
    </div>
</div>

<!-- МЕССЕНДЖЕР -->
<div id="app" class="hidden">
    <div class="sidebar">
        <div class="side-head">
            <div class="av" id="myAv" style="background:#7c3aed">?</div>
            <div style="flex:1">
                <div style="font-weight:600" id="myName"></div>
                <div style="font-size:11px;color:var(--text3)" id="myStatus"></div>
            </div>
            <button class="btn" style="width:35px;height:35px;border-radius:50%;padding:0;font-size:20px;display:flex;align-items:center;justify-content:center" id="btnAdd" title="Добавить друга">+</button>
        </div>
        <input id="search" placeholder="🔍 Поиск..." style="margin:8px;width:calc(100% - 16px);border-radius:20px">
        <div class="chat-list" id="chatList">
            <div style="text-align:center;padding:30px;color:var(--text3)">У вас пока нет чатов</div>
        </div>
    </div>
    <div class="main">
        <div id="empty" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-direction:column">
            <div style="font-size:70px;opacity:0.5">💜</div>
            <h3>Выберите чат</h3>
            <p style="font-size:14px">или добавьте друга</p>
        </div>
        <div id="head" class="hidden" style="padding:10px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
            <div class="av" id="pAv" style="background:#7c3aed">?</div>
            <div style="font-weight:600" id="pName"></div>
        </div>
        <div class="msgs hidden" id="messages"></div>
        <div class="input-box hidden" id="inputArea">
            <input id="msgInput" placeholder="Напишите сообщение...">
            <button class="btn" style="width:40px;height:40px;border-radius:50%;padding:0;font-size:20px" id="btnSend">➤</button>
        </div>
    </div>
</div>

<!-- МОДАЛКА ДОБАВЛЕНИЯ ДРУГА -->
<div class="modal hidden" id="addModal">
    <div class="card">
        <h3 style="margin-bottom:10px">➕ Добавить друга</h3>
        <p style="color:var(--text2);margin-bottom:10px;font-size:13px">Введите никнейм пользователя</p>
        <input id="friendNick" placeholder="Никнейм друга" style="margin-bottom:8px">
        <div class="error" id="addErr"></div>
        <div class="success" id="addOk"></div>
        <button class="btn" id="btnAddFriend">Добавить</button>
        <button class="btn" id="btnCloseAdd" style="background:none;border:2px solid var(--border);margin-top:5px">Отмена</button>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
let user = null, partner = null, timer = null;

// Переключение вкладок
$('tabLogin').onclick = () => { $('tabLogin').classList.add('active'); $('tabReg').classList.remove('active'); $('loginForm').classList.add('active'); $('regForm').classList.remove('active'); };
$('tabReg').onclick = () => { $('tabReg').classList.add('active'); $('tabLogin').classList.remove('active'); $('regForm').classList.add('active'); $('loginForm').classList.remove('active'); };

// РЕГИСТРАЦИЯ
$('regForm').onsubmit = (e) => {
    e.preventDefault();
    $('regErr').textContent = '';
    const nick = $('rNick').value.trim();
    const email = $('rEmail').value.trim();
    const pass = $('rPass').value;
    
    if ($('rPass').value !== $('rPass2').value) return $('regErr').textContent = 'Пароли не совпадают';
    if (nick.length < 3) return $('regErr').textContent = 'Никнейм от 3 символов';
    if (pass.length < 4) return $('regErr').textContent = 'Пароль от 4 символов';
    
    // Проверяем, есть ли уже такой пользователь
    const users = JSON.parse(localStorage.getItem('trust_users') || '[]');
    if (users.find(u => u.nick === nick)) return $('regErr').textContent = 'Никнейм занят';
    if (users.find(u => u.email === email)) return $('regErr').textContent = 'Email занят';
    
    // Создаём пользователя
    const newUser = { nick, email, pass, avatar: '#7c3aed', status: 'В сети', friends: [] };
    users.push(newUser);
    localStorage.setItem('trust_users', JSON.stringify(users));
    
    user = newUser;
    showApp();
};

// ВХОД
$('loginForm').onsubmit = (e) => {
    e.preventDefault();
    $('loginErr').textContent = '';
    const nick = $('lNick').value.trim();
    const email = $('lEmail').value.trim();
    const pass = $('lPass').value;
    
    const users = JSON.parse(localStorage.getItem('trust_users') || '[]');
    const found = users.find(u => u.nick === nick && u.email === email && u.pass === pass);
    
    if (!found) return $('loginErr').textContent = 'Неверные данные';
    
    user = found;
    showApp();
};

function showApp() {
    $('auth').classList.add('hidden');
    $('app').classList.remove('hidden');
    $('myAv').style.background = user.avatar;
    $('myAv').textContent = user.nick[0].toUpperCase();
    $('myName').textContent = user.nick;
    $('myStatus').textContent = user.status;
    refresh();
    timer = setInterval(refresh, 2000);
}

function refresh() {
    if (!user) return;
    loadChats();
    if (partner) loadMessages();
}

function loadChats() {
    const users = JSON.parse(localStorage.getItem('trust_users') || '[]');
    const msgs = JSON.parse(localStorage.getItem('trust_msgs') || '{}');
    const me = users.find(u => u.nick === user.nick);
    if (!me) return;
    
    const chats = [];
    const seen = new Set();
    
    // Чаты с сообщениями
    Object.entries(msgs).forEach(([id, messages]) => {
        if (id.includes(user.nick) && messages.length > 0) {
            const p = id.split('_').find(x => x !== user.nick);
            if (!seen.has(p)) {
                seen.add(p);
                const last = messages[messages.length - 1];
                chats.push({ partner: p, last: last.text, time: last.time });
            }
        }
    });
    
    // Друзья без сообщений
    me.friends.forEach(f => {
        if (!seen.has(f)) chats.push({ partner: f, last: 'Начните общение!', time: 0 });
    });
    
    chats.sort((a, b) => b.time - a.time);
    
    const searchText = ($('search').value || '').toLowerCase();
    const filtered = chats.filter(c => c.partner.toLowerCase().includes(searchText));
    
    $('chatList').innerHTML = filtered.length ? filtered.map(c => `
        <div class="chat-item ${partner === c.partner ? 'active' : ''}" data-p="${c.partner}">
            <div class="av" style="background:#7c3aed">${c.partner[0].toUpperCase()}</div>
            <div style="flex:1">
                <div style="font-weight:600;font-size:14px">${c.partner}</div>
                <div style="font-size:11px;color:var(--text3)">${c.last.slice(0, 30)}</div>
            </div>
            ${c.time ? `<div style="font-size:10px;color:var(--text3)">${new Date(c.time).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'})}</div>` : ''}
        </div>
    `).join('') : '<div style="text-align:center;padding:30px;color:var(--text3)">Нет чатов</div>';
    
    document.querySelectorAll('.chat-item').forEach(el => el.onclick = () => openChat(el.dataset.p));
}

function openChat(p) {
    partner = p;
    $('empty').classList.add('hidden');
    $('head').classList.remove('hidden');
    $('messages').classList.remove('hidden');
    $('inputArea').classList.remove('hidden');
    $('pName').textContent = p;
    $('pAv').textContent = p[0].toUpperCase();
    loadMessages();
    $('msgInput').focus();
}

function loadMessages() {
    if (!partner) return;
    const msgs = JSON.parse(localStorage.getItem('trust_msgs') || '{}');
    const id = [user.nick, partner].sort().join('_');
    const chatMsgs = msgs[id] || [];
    
    $('messages').innerHTML = chatMsgs.length ? chatMsgs.map(m => `
        <div class="msg ${m.from === user.nick ? 'own' : 'other'}">
            ${m.text}
            <div style="font-size:9px;opacity:0.6;margin-top:2px;text-align:right">${new Date(m.time).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'})}</div>
        </div>
    `).join('') : '<div style="text-align:center;color:var(--text3);padding:30px">💜 Начните переписку!</div>';
    
    $('messages').scrollTop = $('messages').scrollHeight;
}

$('btnSend').onclick = () => {
    const text = $('msgInput').value.trim();
    if (!text || !partner) return;
    
    const msgs = JSON.parse(localStorage.getItem('trust_msgs') || '{}');
    const id = [user.nick, partner].sort().join('_');
    if (!msgs[id]) msgs[id] = [];
    msgs[id].push({ from: user.nick, text, time: Date.now() });
    localStorage.setItem('trust_msgs', JSON.stringify(msgs));
    
    $('msgInput').value = '';
    loadMessages();
    loadChats();
};

$('msgInput').onkeydown = e => { if (e.key === 'Enter') $('btnSend').click(); };
$('search').oninput = loadChats;

// ДОБАВЛЕНИЕ ДРУГА
$('btnAdd').onclick = () => {
    $('addModal').classList.remove('hidden');
    $('friendNick').value = '';
    $('addErr').textContent = '';
    $('addOk').textContent = '';
};

$('btnCloseAdd').onclick = () => $('addModal').classList.add('hidden');

$('btnAddFriend').onclick = () => {
    const nick = $('friendNick').value.trim();
    if (!nick) return $('addErr').textContent = 'Введите никнейм';
    if (nick === user.nick) return $('addErr').textContent = 'Нельзя добавить себя';
    
    const users = JSON.parse(localStorage.getItem('trust_users') || '[]');
    const friend = users.find(u => u.nick === nick);
    if (!friend) return $('addErr').textContent = 'Пользователь не найден';
    
    const me = users.find(u => u.nick === user.nick);
    if (me.friends.includes(nick)) return $('addErr').textContent = 'Уже в друзьях';
    
    me.friends.push(nick);
    friend.friends.push(user.nick);
    localStorage.setItem('trust_users', JSON.stringify(users));
    
    $('addOk').textContent = '✅ Добавлен!';
    setTimeout(() => {
        $('addModal').classList.add('hidden');
        loadChats();
    }, 1000);
};

// Проверка при загрузке
const saved = JSON.parse(localStorage.getItem('trust_users') || '[]');
if (saved.length > 0) {
    // Можно добавить авто-вход если нужно
}
</script>
</body>
</html>
