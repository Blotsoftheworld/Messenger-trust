<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доверие — Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0f0619; color: #e8e0f0; height: 100vh; display: flex; }
        #auth { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #1a0d2e, #080311); z-index: 10; }
        #auth.hidden { display: none; }
        .card { background: #1a0d2e; border: 1px solid #2a1848; border-radius: 20px; padding: 25px; width: 360px; text-align: center; }
        .card h1 { color: #8b5cf6; margin: 5px 0; font-size: 24px; }
        .tabs { display: flex; background: #0f0619; border-radius: 25px; padding: 3px; margin: 12px 0; }
        .tab { flex: 1; padding: 8px; border: none; background: none; color: #b8a9d0; cursor: pointer; border-radius: 22px; font-weight: 600; font-size: 13px; }
        .tab.active { background: #8b5cf6; color: #fff; }
        .form { display: none; flex-direction: column; gap: 8px; }
        .form.active { display: flex; }
        input { padding: 10px; background: #1e1133; border: 2px solid #2a1848; border-radius: 8px; color: #e8e0f0; outline: none; font-size: 14px; }
        input:focus { border-color: #8b5cf6; }
        button { padding: 10px; background: #8b5cf6; color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .error { color: #ef4444; font-size: 12px; min-height: 16px; }
        .success { color: #22c55e; font-size: 12px; }
        #app { display: flex; width: 100vw; height: 100vh; }
        #app.hidden { display: none; }
        .sidebar { width: 300px; background: #130924; border-right: 1px solid #2a1848; display: flex; flex-direction: column; }
        .side-head { padding: 12px; border-bottom: 1px solid #2a1848; display: flex; align-items: center; gap: 8px; }
        .av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 15px; }
        .chat-list { flex: 1; overflow-y: auto; padding: 5px; }
        .chat-item { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 8px; cursor: pointer; }
        .chat-item:hover { background: rgba(139,92,246,0.1); }
        .chat-item.active { background: rgba(139,92,246,0.2); }
        .main { flex: 1; display: flex; flex-direction: column; background: #0d0418; }
        .msgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 4px; }
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 14px; font-size: 13px; }
        .msg.own { align-self: flex-end; background: #7c3aed; color: #fff; }
        .msg.other { align-self: flex-start; background: #251840; }
        .input-box { padding: 10px; border-top: 1px solid #2a1848; display: flex; gap: 8px; background: #130924; }
        .input-box input { flex: 1; border-radius: 20px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 20; }
        .modal.hidden { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth">
    <div class="card">
        <div style="font-size:40px;">💜</div>
        <h1>Доверие</h1>
        <div class="tabs">
            <button class="tab active" id="tab1">Вход</button>
            <button class="tab" id="tab2">Регистрация</button>
        </div>
        <form class="form active" id="f1">
            <input id="l1" placeholder="Никнейм">
            <input id="l2" placeholder="Email">
            <input id="l3" type="password" placeholder="Пароль">
            <div class="error" id="e1"></div>
            <button type="submit">Войти</button>
        </form>
        <form class="form" id="f2">
            <input id="r1" placeholder="Никнейм">
            <input id="r2" placeholder="Email">
            <input id="r3" type="password" placeholder="Пароль">
            <input id="r4" type="password" placeholder="Повторите пароль">
            <div class="error" id="e2"></div>
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>
</div>

<div id="app" class="hidden">
    <div class="sidebar">
        <div class="side-head">
            <div class="av" id="ava" style="background:#7c3aed">?</div>
            <div style="flex:1"><b id="nam"></b></div>
            <button style="width:32px;height:32px;border-radius:50%;font-size:18px;background:#1e1133;border:none;color:#b8a9d0;cursor:pointer" id="addBtn">+</button>
        </div>
        <div class="chat-list" id="list"></div>
    </div>
    <div class="main">
        <div id="empty" style="flex:1;display:flex;align-items:center;justify-content:center;color:#7a6b90;flex-direction:column">
            <div style="font-size:60px">💜</div>
            <h3>Выберите чат</h3>
        </div>
        <div id="head" class="hidden" style="padding:10px;border-bottom:1px solid #2a1848;display:flex;align-items:center;gap:8px">
            <div class="av" id="pav" style="background:#7c3aed">?</div>
            <b id="pnm"></b>
        </div>
        <div class="msgs hidden" id="msgs"></div>
        <div class="input-box hidden" id="inp">
            <input id="txt" placeholder="Сообщение...">
            <button style="width:36px;height:36px;border-radius:50%;font-size:18px;padding:0" id="snd">➤</button>
        </div>
    </div>
</div>

<div class="modal hidden" id="mod">
    <div class="card">
        <h3>➕ Добавить друга</h3>
        <input id="fn" placeholder="Никнейм друга" style="margin:8px 0">
        <div class="error" id="fe"></div>
        <div class="success" id="fs"></div>
        <button id="cf">Добавить</button>
        <button id="cl" style="background:none;border:2px solid #2a1848;margin-top:5px">Отмена</button>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
let me = null, chat = null;

// РАБОЧИЙ СЕРВЕР - не localStorage!
const URL = 'https://trust-srvr.glitch.me';

$('tab1').onclick = () => { $('tab1').classList.add('active'); $('tab2').classList.remove('active'); $('f1').classList.add('active'); $('f2').classList.remove('active'); };
$('tab2').onclick = () => { $('tab2').classList.add('active'); $('tab1').classList.remove('active'); $('f2').classList.add('active'); $('f1').classList.remove('active'); };

async function api(url, opt = {}) {
    const r = await fetch(URL + url, { headers: { 'Content-Type': 'application/json' }, ...opt });
    if (!r.ok) throw new Error((await r.json()).error);
    return r.json();
}

$('f2').onsubmit = async (e) => {
    e.preventDefault();
    $('e2').textContent = '';
    if ($('r3').value !== $('r4').value) return $('e2').textContent = 'Пароли не совпадают';
    try {
        await api('/reg', { method: 'POST', body: JSON.stringify({ nick: $('r1').value, email: $('r2').value, pass: $('r3').value }) });
        me = { nick: $('r1').value };
        show();
    } catch (err) { $('e2').textContent = err.message; }
};

$('f1').onsubmit = async (e) => {
    e.preventDefault();
    $('e1').textContent = '';
    try {
        me = await api('/login', { method: 'POST', body: JSON.stringify({ nick: $('l1').value, email: $('l2').value, pass: $('l3').value }) });
        show();
    } catch (err) { $('e1').textContent = err.message; }
};

function show() {
    $('auth').classList.add('hidden');
    $('app').classList.remove('hidden');
    $('ava').textContent = me.nick[0].toUpperCase();
    $('nam').textContent = me.nick;
    refresh();
    setInterval(refresh, 2000);
}

async function refresh() {
    if (!me) return;
    const data = await api('/list/' + me.nick);
    $('list').innerHTML = data.map(c => `
        <div class="chat-item ${chat===c.p?'active':''}" data-p="${c.p}">
            <div class="av" style="background:#7c3aed">${c.p[0].toUpperCase()}</div>
            <div style="flex:1"><b>${c.p}</b><br><small style="color:#7a6b90">${(c.last||'').slice(0,25)}</small></div>
        </div>
    `).join('') || '<div style="text-align:center;padding:20px;color:#7a6b90">Нет чатов</div>';
    
    document.querySelectorAll('.chat-item').forEach(el => el.onclick = () => open(el.dataset.p));
    
    if (chat) {
        const msgs = await api('/msgs/' + me.nick + '/' + chat);
        $('msgs').innerHTML = msgs.map(m => `
            <div class="msg ${m.from===me.nick?'own':'other'}">${m.text}<br><small style="opacity:0.6">${new Date(m.time).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}</small></div>
        `).join('') || '<div style="text-align:center;color:#7a6b90;padding:20px">Начните переписку</div>';
        $('msgs').scrollTop = $('msgs').scrollHeight;
    }
}

function open(p) {
    chat = p;
    $('empty').classList.add('hidden'); $('head').classList.remove('hidden');
    $('msgs').classList.remove('hidden'); $('inp').classList.remove('hidden');
    $('pav').textContent = p[0].toUpperCase(); $('pnm').textContent = p;
    refresh();
}

$('snd').onclick = async () => {
    const t = $('txt').value.trim();
    if (!t || !chat) return;
    await api('/msg', { method: 'POST', body: JSON.stringify({ from: me.nick, to: chat, text: t }) });
    $('txt').value = '';
    refresh();
};

$('txt').onkeydown = e => { if (e.key === 'Enter') $('snd').click(); };

$('addBtn').onclick = () => { $('mod').classList.remove('hidden'); $('fn').value = ''; $('fe').textContent = ''; $('fs').textContent = ''; };
$('cl').onclick = () => $('mod').classList.add('hidden');
$('cf').onclick = async () => {
    const n = $('fn').value.trim();
    if (!n) return;
    try {
        await api('/friend', { method: 'POST', body: JSON.stringify({ user: me.nick, friend: n }) });
        $('fs').textContent = '✅ Добавлен!';
        $('fe').textContent = '';
        setTimeout(() => $('mod').classList.add('hidden'), 1000);
        refresh();
    } catch (err) { $('fe').textContent = err.message; }
};
</script>
</body>
</html>
