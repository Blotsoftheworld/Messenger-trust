<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доверие — Мессенджер</title>
    <style>
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --bg3: #0e0e15; --chat: #08080d;
            --input: #161622; --msg-own: #5b4ae0; --msg-other: #1e1e2e;
            --accent: #6c5ce7; --text: #e4e4f0; --text2: #a0a0b8;
            --text3: #6b6b80; --border: #1f1f30; --red: #e74c3c; --green: #2ecc71;
            --online: #2ecc71;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: var(--text); height: 100dvh; overflow: hidden; display: flex; }

        #authScreen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #12121a, #050508); z-index: 100; }
        #authScreen.hidden { display: none; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: min(380px, 92vw); text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-height: 90vh; overflow-y: auto; }
        .card h1 { color: var(--accent); margin: 8px 0; font-size: 24px; font-weight: 700; }
        .tabs { display: flex; background: var(--bg); border-radius: 12px; padding: 3px; margin: 16px 0; }
        .tab { flex: 1; padding: 10px; border: none; background: none; color: var(--text2); cursor: pointer; border-radius: 10px; font-weight: 600; font-size: 13px; }
        .tab.active { background: var(--accent); color: #fff; }
        .form { display: none; flex-direction: column; gap: 10px; }
        .form.active { display: flex; }
        input, textarea { padding: 12px 14px; background: var(--input); border: 2px solid var(--border); border-radius: 10px; color: var(--text); outline: none; font-size: 14px; width: 100%; font-family: inherit; }
        input:focus, textarea:focus { border-color: var(--accent); }
        button { padding: 12px 20px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .link { color: var(--accent); cursor: pointer; font-size: 12px; text-decoration: underline; background: none; border: none; padding: 4px; }
        .error { color: var(--red); font-size: 11px; min-height: 14px; }
        .success { color: var(--green); font-size: 11px; }
        .suggestions { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; max-height: 150px; overflow-y: auto; width: 100%; z-index: 10; display: none; margin-top: 2px; position: absolute; }
        .suggestion-item { padding: 8px 12px; cursor: pointer; font-size: 13px; text-align: left; }
        .suggestion-item:hover { background: rgba(108,92,231,0.15); }

        #appScreen { display: flex; width: 100vw; height: 100dvh; }
        #appScreen.hidden { display: none; }
        .sidebar { width: 320px; min-width: 280px; background: var(--bg3); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-head { padding: 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 17px; background: var(--accent); background-size: cover; background-position: center; cursor: pointer; flex-shrink: 0; position: relative; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--online); position: absolute; bottom: 0; right: 0; border: 2px solid var(--bg3); }
        .verified-badge { position: absolute; top: -2px; right: -2px; background: #2ecc71; color: #000; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 2px solid var(--bg3); z-index: 1; }
        .chat-list { flex: 1; overflow-y: auto; padding: 6px; }
        .chat-item { display: flex; align-items: center; gap: 10px; padding: 12px 10px; border-radius: 10px; cursor: pointer; }
        .chat-item:hover { background: rgba(108,92,231,0.08); }
        .chat-item.active { background: rgba(108,92,231,0.15); }
        .main { flex: 1; display: flex; flex-direction: column; background: var(--chat); min-width: 0; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }
        .msg { max-width: 80%; padding: 8px 14px; border-radius: 12px; font-size: 13px; word-wrap: break-word; position: relative; }
        .msg.own { align-self: flex-end; background: var(--msg-own); color: #fff; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        .msg.deleted { opacity: 0.5; font-style: italic; background: transparent !important; color: var(--text3) !important; border: 1px dashed var(--border); }
        .msg .delete-btn { position: absolute; top: 2px; right: 6px; background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 4px; display: none; }
        .msg.own:hover .delete-btn { display: block; }
        .msg .delete-btn:hover { color: #e74c3c; background: rgba(231,76,60,0.2); }
        .file-attachment { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: rgba(0,0,0,0.3); border-radius: 8px; margin: 4px 0; cursor: pointer; }
        .file-icon { width: 32px; height: 32px; border-radius: 6px; background: var(--input); display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-size: 11px; font-weight: 600; }
        .file-size { font-size: 9px; color: var(--text3); }
        .input-area { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--bg3); align-items: center; }
        .input-area input[type="text"] { flex: 1; border-radius: 20px; }
        .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--input); border: none; color: var(--text2); cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-btn:hover { background: var(--accent); color: #fff; }
        .icon-btn.send { background: var(--accent); color: #fff; }
        .preview-bar { padding: 8px 14px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 12px; }

        .settings-panel, .profile-panel { position: fixed; top: 0; right: -100%; width: min(380px, 90vw); height: 100dvh; background: var(--bg2); border-left: 1px solid var(--border); z-index: 50; transition: right 0.3s; display: flex; flex-direction: column; overflow-y: auto; }
        .settings-panel.open, .profile-panel.open { right: 0; }
        .settings-section, .profile-section { padding: 14px; border-bottom: 1px solid var(--border); }
        .settings-section h3, .profile-section h3 { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .color-dot.selected { border-color: #fff; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal.hidden { display: none; }
        .hidden { display: none !important; }
        .tg-link { color: #fff; background: #2AABEE; padding: 12px 18px; border-radius: 10px; text-decoration: none; display: block; margin: 6px 0; font-weight: 600; text-align: center; }
        .verify-btn { background: #2ecc71; color: #000; padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; margin: 4px; }
        .unverify-btn { background: #e74c3c; color: #fff; padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; margin: 4px; }
        @media (max-width: 768px) { .sidebar { position: absolute; z-index: 30; width: 100%; min-width: 100%; height: 100dvh; } .sidebar.mobile-hidden { display: none; } .back-btn-mobile { display: flex !important; } }
        .back-btn-mobile { display: none; width: 32px; height: 32px; border-radius: 50%; background: var(--input); border: none; color: var(--text2); cursor: pointer; align-items: center; justify-content: center; font-size: 15px; margin-right: 6px; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="card">
        <div style="font-size:32px;">🔐</div>
        <h1>Доверие</h1>
        <p style="color:var(--text2);font-size:13px;">Шифрованный мессенджер</p>
        <div class="tabs">
            <button class="tab active" id="tabLogin">Вход</button>
            <button class="tab" id="tabReg">Регистрация</button>
            <button class="tab" id="tabReset" style="display:none;">Сброс</button>
        </div>
        <form class="form active" id="loginForm">
            <input id="loginNick" placeholder="Никнейм">
            <input id="loginEmail" type="email" placeholder="Email">
            <input id="loginPass" type="password" placeholder="Пароль">
            <div class="error" id="loginError"></div>
            <button type="submit">Войти</button>
            <button type="button" class="link" id="forgotPassBtn">Забыли пароль?</button>
        </form>
        <form class="form" id="regForm">
            <input id="regNick" placeholder="Никнейм">
            <input id="regEmail" type="email" placeholder="Email">
            <input id="regPass" type="password" placeholder="Пароль">
            <input id="regPass2" type="password" placeholder="Повторите пароль">
            <div class="error" id="regError"></div>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <form class="form" id="resetForm">
            <p style="font-size:12px;color:var(--text2);">Сброс пароля</p>
            <input id="resetNick" placeholder="Никнейм">
            <input id="resetEmail" type="email" placeholder="Email">
            <input id="resetNewPass" type="password" placeholder="Новый пароль">
            <div class="error" id="resetError"></div>
            <div class="success" id="resetSuccess"></div>
            <button type="submit">Сбросить пароль</button>
            <button type="button" class="link" id="backToLogin">← Назад</button>
        </form>
    </div>
</div>

<div id="appScreen" class="hidden">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-head">
            <div class="avatar" id="myAvatar" onclick="openProfile()" style="position:relative;"><div class="online-dot"></div></div>
            <div style="flex:1;min-width:0;cursor:pointer" onclick="openProfile()"><b id="myName"></b><br><small style="color:var(--text3)" id="myStatus">В сети</small></div>
            <button class="icon-btn" id="btnAddFriend">+</button>
            <button class="icon-btn" onclick="openSettings()">⚙</button>
        </div>
        <div style="padding:8px"><input id="searchChats" placeholder="🔍 Поиск..." style="width:100%;border-radius:20px;padding:10px;"></div>
        <div class="chat-list" id="chatList"></div>
    </div>
    <div class="main">
        <div id="emptyChat" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-direction:column"><div style="font-size:56px;opacity:0.4">💬</div><h3>Выберите чат</h3></div>
        <div id="chatHead" class="hidden" style="padding:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
            <button class="back-btn-mobile" id="btnBack">←</button>
            <div class="avatar" id="partnerAvatar" onclick="viewProfile()" style="cursor:pointer;"></div>
            <div style="flex:1;cursor:pointer" onclick="viewProfile()"><b id="partnerName"></b><br><small style="color:var(--text3)" id="partnerStatus"></small></div>
        </div>
        <div class="messages hidden" id="messagesContainer"></div>
        <div class="preview-bar hidden" id="previewBar"></div>
        <div class="input-area hidden" id="inputArea">
            <input type="file" id="fileInput" accept="image/*,video/*,audio/*" onchange="handleFileSelect()" hidden>
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()">🎤</button>
            <button class="icon-btn send" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<div class="profile-panel" id="profilePanel">
    <div style="padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between"><h3>Профиль</h3><button style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer" onclick="closeProfile()">✕</button></div>
    <div class="profile-section" style="text-align:center"><div class="avatar" id="profileAvatar" style="width:80px;height:80px;font-size:30px;margin:0 auto;"></div><h3 id="profileNick" style="margin-top:12px;"></h3></div>
    <div class="profile-section"><p><b>Статус:</b> <span id="profileBio"></span></p><p><b>Друзей:</b> <span id="profileFriends"></span></p><div id="verifyControls" style="margin-top:12px;"></div></div>
    <div style="padding:16px;"><button id="btnOpenChat" style="width:100%;">Написать</button></div>
</div>

<div class="settings-panel" id="settingsPanel">
    <div style="padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between"><h3>Настройки</h3><button style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer" onclick="closeSettings()">✕</button></div>
    <div class="settings-section" style="text-align:center"><label for="avatarFileInput" style="cursor:pointer"><div class="avatar" id="settingsAvatar" style="width:70px;height:70px;font-size:28px;margin:0 auto">?</div></label><input type="file" id="avatarFileInput" accept="image/*" onchange="updateAvatar()" hidden></div>
    <div class="settings-section"><h3>Профиль</h3><input id="settingsNick" placeholder="Никнейм" style="margin-bottom:8px"><input id="settingsStatus" placeholder="Статус" style="margin-bottom:8px"><textarea id="settingsBio" placeholder="О себе..." rows="2" style="background:var(--input);border:2px solid var(--border);border-radius:10px;color:var(--text);padding:10px;"></textarea></div>
    <div class="settings-section"><h3>Аккаунт</h3><input id="settingsEmail" type="email" placeholder="Email"><input id="settingsPass" type="password" placeholder="Новый пароль" style="margin-top:8px;"></div>
    <div class="settings-section"><h3>Цвет темы</h3><div class="color-row" id="themeColors"></div></div>
    <div class="settings-section" style="text-align:center;"><h3>Поддержать проект</h3><button onclick="showDonate()" style="background:linear-gradient(135deg, #f59e0b, #e74c3c);width:100%;">Задонатить</button></div>
    <div style="padding:16px;display:flex;flex-direction:column;gap:8px"><button id="btnSaveSettings">Сохранить</button><button id="btnLogout" style="background:var(--red)">Выйти</button></div>
</div>

<div class="modal hidden" id="addFriendModal"><div class="card"><h3>Добавить друга</h3><div style="position:relative;"><input id="friendNickInput" placeholder="Никнейм" oninput="searchUsers()" onfocus="searchUsers()"><div class="suggestions" id="userSuggestions"></div></div><div class="error" id="addFriendError"></div><div class="success" id="addFriendSuccess"></div><button id="btnConfirmAddFriend" style="margin-top:10px;">Добавить</button><button id="btnCancelAddFriend" style="background:none;border:2px solid var(--border);margin-top:8px">Отмена</button></div></div>
<div class="modal hidden" id="donateModal"><div class="card"><h3>Поддержать проект</h3><p style="color:var(--text2);margin:12px 0;">Напишите нам в Telegram:</p><a href="https://t.me/Blotsoftheworld" target="_blank" class="tg-link">@Blotsoftheworld</a><a href="https://t.me/Eruaxis" target="_blank" class="tg-link">@Eruaxis</a><button onclick="$('donateModal').classList.add('hidden')" style="margin-top:10px;width:100%;">Закрыть</button></div></div>

<script>
const $ = id => document.getElementById(id);
const FIREBASE_URL = 'https://trust-c10aa-default-rtdb.firebaseio.com';
const CREATOR_EMAIL = 'logunov2512@gmail.com';

let DB = { users: {}, messages: {} };
let me = null, activeChat = null, refreshTimer = null;
let mediaRecorder = null, audioChunks = [], stream = null;
let pendingFile = null, userScrolledUp = false;
let viewingProfile = null;
const themeColors = ['#6c5ce7','#e74c3c','#f39c12','#3498db','#1abc9c','#e91e63','#9b59b6','#2ecc71'];

function norm(s) { return String(s||'').toLowerCase().trim(); }

async function loadDB() { try { const r = await fetch(FIREBASE_URL + '/.json'); if (r.ok) { const d = await r.json(); if (d) { DB.users = d.users || {}; DB.messages = d.messages || {}; } } } catch(e) {} }
async function saveUser(user) { await fetch(FIREBASE_URL + '/users/' + user.nick + '.json', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(user) }); }

$('tabLogin').onclick = () => { $('tabLogin').classList.add('active'); $('tabReg').classList.remove('active'); $('loginForm').classList.add('active'); $('regForm').classList.remove('active'); $('resetForm').classList.remove('active'); $('tabReset').style.display='none'; $('tabLogin').style.display='block'; $('tabReg').style.display='block'; };
$('tabReg').onclick = () => { $('tabReg').classList.add('active'); $('tabLogin').classList.remove('active'); $('regForm').classList.add('active'); $('loginForm').classList.remove('active'); $('resetForm').classList.remove('active'); $('tabReset').style.display='none'; $('tabLogin').style.display='block'; $('tabReg').style.display='block'; };
$('forgotPassBtn').onclick = () => { $('tabLogin').style.display='none'; $('tabReg').style.display='none'; $('tabReset').style.display='block'; $('tabReset').classList.add('active'); $('loginForm').classList.remove('active'); $('regForm').classList.remove('active'); $('resetForm').classList.add('active'); };
$('backToLogin').onclick = () => { $('tabLogin').style.display='block'; $('tabReg').style.display='block'; $('tabReset').style.display='none'; $('tabLogin').classList.add('active'); $('loginForm').classList.add('active'); $('regForm').classList.remove('active'); $('resetForm').classList.remove('active'); };

// РЕГИСТРАЦИЯ
$('regForm').onsubmit = async (e) => {
    e.preventDefault(); $('regError').textContent = '';
    const nick = norm($('regNick').value), email = norm($('regEmail').value);
    const pass = $('regPass').value, pass2 = $('regPass2').value;
    if (pass !== pass2) return $('regError').textContent = 'Пароли не совпадают';
    if (nick.length < 3) return $('regError').textContent = 'Никнейм от 3';
    if (pass.length < 4) return $('regError').textContent = 'Пароль от 4';
    const r = await fetch(FIREBASE_URL + '/users/' + nick + '.json');
    if (r.ok && await r.json()) return $('regError').textContent = 'Никнейм занят';
    const verified = email === CREATOR_EMAIL;
    const user = { nick, email, pass, avatar: '', color: themeColors[0], status: 'В сети', bio: '', friends: [], verified };
    DB.users[nick] = user; await saveUser(user);
    me = user; showApp();
};

// ВХОД (проверка через Firebase)
$('loginForm').onsubmit = async (e) => {
    e.preventDefault(); $('loginError').textContent = '';
    const nick = norm($('loginNick').value), email = norm($('loginEmail').value), pass = $('loginPass').value;
    const r = await fetch(FIREBASE_URL + '/users/' + nick + '.json');
    if (r.ok) {
        const u = await r.json();
        if (u && u.email === email && u.pass === pass) {
            DB.users[nick] = u; me = u; showApp(); return;
        }
    }
    $('loginError').textContent = 'Неверные данные';
};

// СБРОС ПАРОЛЯ
$('resetForm').onsubmit = async (e) => {
    e.preventDefault(); $('resetError').textContent = ''; $('resetSuccess').textContent = '';
    const nick = norm($('resetNick').value), email = norm($('resetEmail').value), np = $('resetNewPass').value;
    if (np.length < 4) return $('resetError').textContent = 'Пароль от 4';
    const r = await fetch(FIREBASE_URL + '/users/' + nick + '.json');
    if (r.ok) { const u = await r.json(); if (u?.email === email) { u.pass = np; await saveUser(u); $('resetSuccess').textContent = 'Пароль изменён!'; return; } }
    $('resetError').textContent = 'Не найден';
};

function showApp() { $('authScreen').classList.add('hidden'); $('appScreen').classList.remove('hidden'); applyTheme(me.color); updateUI(); refresh(); refreshTimer = setInterval(refresh, 2000); $('messagesContainer').addEventListener('scroll', () => { userScrolledUp = $('messagesContainer').scrollHeight - $('messagesContainer').scrollTop - $('messagesContainer').clientHeight > 80; }); }
function applyTheme(c) { document.documentElement.style.setProperty('--accent', c); document.documentElement.style.setProperty('--msg-own', c); }
function updateUI() {
    const av = $('myAvatar'), sa = $('settingsAvatar'); [av, sa].forEach(el => { if (!el) return;
        if (me.avatar) { el.style.backgroundImage = `url(${me.avatar})`; el.style.backgroundColor = 'transparent'; el.textContent = ''; }
        else { el.style.backgroundImage = 'none'; el.style.backgroundColor = me.color; el.textContent = me.nick[0].toUpperCase(); }
        const b = el.querySelector('.verified-badge'); if (b) b.remove();
        if (me.verified) { const badge = document.createElement('div'); badge.className = 'verified-badge'; badge.textContent = '✓'; el.style.position = 'relative'; el.appendChild(badge); }
    });
    $('myName').textContent = me.nick; $('myStatus').textContent = me.status;
    $('settingsNick').value = me.nick; $('settingsStatus').value = me.status; $('settingsBio').value = me.bio || '';
    $('settingsEmail').value = me.email || ''; $('settingsPass').value = '';
    $('themeColors').innerHTML = themeColors.map(c => `<div class="color-dot ${c === me.color ? 'selected' : ''}" style="background:${c}" data-color="${c}"></div>`).join('');
    document.querySelectorAll('.color-dot').forEach(d => d.onclick = () => { me.color = d.dataset.color; applyTheme(me.color); updateUI(); });
}

// ОСТАЛЬНЫЕ ФУНКЦИИ (без изменений)
async function toggleVerify(targetNick) { if (!me || norm(me.email) !== CREATOR_EMAIL) return; const r = await fetch(FIREBASE_URL + '/users/' + targetNick + '.json'); if (r.ok) { const u = await r.json(); if (u) { u.verified = !u.verified; await saveUser(u); DB.users[targetNick] = u; if (viewingProfile === targetNick) renderProfileView(u); refresh(); } } }
function openProfile() { viewingProfile = me.nick; renderProfileView(me); $('profilePanel').classList.add('open'); $('btnOpenChat').classList.add('hidden'); }
function closeProfile() { $('profilePanel').classList.remove('open'); }
async function viewProfile() { if (!activeChat) return; viewingProfile = activeChat; const r = await fetch(FIREBASE_URL + '/users/' + activeChat + '.json'); if (r.ok) { const u = await r.json(); if (u) { DB.users[activeChat] = u; renderProfileView(u); $('btnOpenChat').classList.remove('hidden'); $('btnOpenChat').onclick = () => { closeProfile(); openChat(activeChat); }; $('profilePanel').classList.add('open'); } } }
function renderProfileView(user) { const pa = $('profileAvatar'); if (user.avatar) { pa.style.backgroundImage = `url(${user.avatar})`; pa.style.backgroundColor = 'transparent'; pa.textContent = ''; } else { pa.style.backgroundImage = 'none'; pa.style.backgroundColor = user.color; pa.textContent = user.nick[0].toUpperCase(); } const b = pa.querySelector('.verified-badge'); if (b) b.remove(); if (user.verified) { const badge = document.createElement('div'); badge.className = 'verified-badge'; badge.textContent = '✓'; pa.style.position = 'relative'; pa.appendChild(badge); } $('profileNick').textContent = user.nick; $('profileBio').textContent = user.bio || 'Не указано'; $('profileFriends').textContent = (user.friends || []).length; const vc = $('verifyControls'); vc.innerHTML = ''; if (me && norm(me.email) === CREATOR_EMAIL && norm(user.nick) !== norm(me.nick)) { vc.innerHTML = user.verified ? `<button class="unverify-btn" onclick="toggleVerify('${user.nick}')">❌ Забрать галочку</button>` : `<button class="verify-btn" onclick="toggleVerify('${user.nick}')">✅ Выдать галочку</button>`; } }

async function refresh() { if (!me) return; const r = await fetch(FIREBASE_URL + '/.json'); if (r.ok) { const d = await r.json(); if (d) { DB.users = d.users || {}; DB.messages = d.messages || {}; } } me = DB.users[me.nick] || me; const chats = [], seen = new Set(); Object.entries(DB.messages || {}).forEach(([id, msgs]) => { if (id.includes(me.nick) && msgs && Object.keys(msgs).length) { const p = id.split('_').find(x => x !== me.nick); if (!seen.has(p)) { seen.add(p); const arr = Object.values(msgs); const l = arr[arr.length - 1]; chats.push({ partner: p, last: l.deleted ? 'Удалено' : (l.file ? '[Медиа]' : (l.text || '')), time: l.time }); } } }); (me.friends || []).forEach(f => { if (!seen.has(f)) chats.push({ partner: f, last: 'Начните общение!', time: 0 }); }); chats.sort((a, b) => b.time - a.time); $('chatList').innerHTML = chats.length ? chats.map(c => { const f = DB.users[c.partner]; return `<div class="chat-item ${activeChat === c.partner ? 'active' : ''}" data-p="${c.partner}"><div class="avatar" style="background:${f?.color || 'var(--accent)'};position:relative;">${c.partner[0].toUpperCase()}${f?.verified ? '<div class="verified-badge">✓</div>' : ''}</div><div style="flex:1"><b>${c.partner}</b><br><small style="color:var(--text3)">${(c.last || '').slice(0, 25)}</small></div></div>`; }).join('') : '<div style="text-align:center;padding:30px;color:var(--text3)">Нет чатов</div>'; document.querySelectorAll('.chat-item').forEach(el => el.onclick = () => openChat(el.dataset.p)); if (activeChat) renderMessages(); }
function openChat(p) { activeChat = p; userScrolledUp = false; $('emptyChat').classList.add('hidden'); $('chatHead').classList.remove('hidden'); $('messagesContainer').classList.remove('hidden'); $('inputArea').classList.remove('hidden'); $('partnerName').textContent = p; $('partnerAvatar').textContent = p[0].toUpperCase(); $('partnerAvatar').style.background = 'var(--accent)'; const b = $('partnerAvatar').querySelector('.verified-badge'); if (b) b.remove(); fetch(FIREBASE_URL + '/users/' + p + '.json').then(r => r.json()).then(u => { if (u?.verified) { const badge = document.createElement('div'); badge.className = 'verified-badge'; badge.textContent = '✓'; $('partnerAvatar').style.position = 'relative'; $('partnerAvatar').appendChild(badge); } }); if (window.innerWidth <= 768) $('sidebar').classList.add('mobile-hidden'); renderMessages(); }
function closeChat() { activeChat = null; $('sidebar').classList.remove('mobile-hidden'); $('emptyChat').classList.remove('hidden'); $('chatHead').classList.add('hidden'); $('messagesContainer').classList.add('hidden'); $('inputArea').classList.add('hidden'); }

async function deleteMessage(msgTime) { if (!activeChat || !me) return; const id = [me.nick, activeChat].sort().join('_'); await fetch(FIREBASE_URL + '/messages/' + id + '/' + msgTime + '.json', { method: 'PATCH', body: JSON.stringify({ deleted: true, text: '', file: null }) }); renderMessages(); }
function renderMessages() { if (!activeChat || !me) return; const id = [me.nick, activeChat].sort().join('_'); const msgs = DB.messages?.[id] ? Object.values(DB.messages[id]) : []; const wb = !userScrolledUp; $('messagesContainer').innerHTML = msgs.length ? msgs.map(m => { if (m.deleted) return '<div class="msg deleted"><i>Сообщение удалено</i></div>'; let t = m.text || '', c = ''; if (m.file) { const icons = { image: '🖼️', video: '🎬', audio: '🎵' }, names = { image: 'Изображение', video: 'Видео', audio: 'Аудио' }; c += `<div class="file-attachment" onclick="window.open('${m.file}')"><div class="file-icon">${icons[m.fileType] || '📎'}</div><div class="file-info"><div class="file-name">${names[m.fileType] || 'Файл'}</div></div></div>`; } if (t) c += `<div>${t}</div>`; const del = m.from === me.nick ? `<button class="delete-btn" onclick="event.stopPropagation();deleteMessage(${m.time})">✕</button>` : ''; return `<div class="msg ${m.from === me.nick ? 'own' : 'other'}">${del}${c}<div style="font-size:9px;opacity:0.6;margin-top:3px;text-align:right">${new Date(m.time).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })}</div></div>`; }).join('') : '<div style="text-align:center;color:var(--text3);padding:30px">💬 Начните переписку</div>'; if (wb) $('messagesContainer').scrollTop = $('messagesContainer').scrollHeight; }

async function sendMessage(text = '', file = null, fileType = '') { if (!activeChat || !me) return; const id = [me.nick, activeChat].sort().join('_'); const msg = { from: me.nick, text, file, fileType, time: Date.now() }; await fetch(FIREBASE_URL + '/messages/' + id + '/' + Date.now() + '.json', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(msg) }); pendingFile = null; $('previewBar').classList.add('hidden'); $('messageInput').value = ''; userScrolledUp = false; renderMessages(); }
$('sendBtn').onclick = () => { const t = $('messageInput').value.trim(); if (pendingFile) sendMessage(t, pendingFile.data, pendingFile.type); else if (t) sendMessage(t); };
$('messageInput').onkeydown = e => { if (e.key === 'Enter') $('sendBtn').click(); };
async function handleFileSelect() { const file = $('fileInput').files[0]; if (!file) return; if (file.size > 500 * 1024) { alert('Макс. 500 КБ'); return; } const reader = new FileReader(); reader.onload = () => { const type = file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : file.type.startsWith('audio/') ? 'audio' : 'file'; pendingFile = { data: reader.result, type, name: file.name }; $('previewBar').innerHTML = `<span>${type === 'image' ? '🖼️' : type === 'video' ? '🎬' : type === 'audio' ? '🎵' : '📎'} ${file.name}</span> <button onclick="cancelFile()" style="background:var(--red);padding:4px 10px;border-radius:12px;border:none;color:#fff;">✕</button>`; $('previewBar').classList.remove('hidden'); }; reader.readAsDataURL(file); $('fileInput').value = ''; }
function cancelFile() { pendingFile = null; $('previewBar').classList.add('hidden'); }
async function toggleVoice() { if (mediaRecorder?.state === 'recording') { mediaRecorder.stop(); return; } try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(stream); audioChunks = []; mediaRecorder.ondataavailable = e => audioChunks.push(e.data); mediaRecorder.onstop = () => { const blob = new Blob(audioChunks, { type: 'audio/webm' }); if (blob.size > 500 * 1024) { alert('Макс. 30 сек'); return; } const reader = new FileReader(); reader.onload = () => { pendingFile = { data: reader.result, type: 'audio', name: 'Голосовое' }; $('previewBar').innerHTML = `🎤 Голосовое <button onclick="cancelFile()" style="background:var(--red);padding:4px 10px;border-radius:12px;border:none;color:#fff;">✕</button>`; $('previewBar').classList.remove('hidden'); }; reader.readAsDataURL(blob); stream.getTracks().forEach(t => t.stop()); stream = null; $('voiceBtn').textContent = '🎤'; $('voiceBtn').style.background = 'var(--input)'; }; mediaRecorder.start(); $('voiceBtn').textContent = '⏹'; $('voiceBtn').style.background = 'var(--red)'; setTimeout(() => { if (mediaRecorder?.state === 'recording') mediaRecorder.stop(); }, 30000); } catch { alert('Нет доступа к микрофону.'); } }
function updateAvatar() { const file = $('avatarFileInput').files[0]; if (!file) return; if (file.size > 100 * 1024) { alert('Макс. 100 КБ'); return; } const reader = new FileReader(); reader.onload = () => { me.avatar = reader.result; updateUI(); saveUser(me); }; reader.readAsDataURL(file); }
async function searchUsers() { const q = norm($('friendNickInput').value); const sug = $('userSuggestions'); if (q.length < 1) { sug.style.display = 'none'; return; } const r = await fetch(FIREBASE_URL + '/users.json'); if (r.ok) { const users = await r.json() || {}; const matches = Object.values(users).filter(u => norm(u.nick).includes(q) && norm(u.nick) !== norm(me.nick)).slice(0, 5); sug.innerHTML = matches.length ? matches.map(u => `<div class="suggestion-item" onclick="selectUser('${u.nick}')">${u.nick}${u.verified ? ' ✓' : ''}</div>`).join('') : '<div class="suggestion-item">Никого</div>'; sug.style.display = 'block'; } }
function selectUser(nick) { $('friendNickInput').value = nick; $('userSuggestions').style.display = 'none'; }
function openSettings() { updateUI(); $('settingsPanel').classList.add('open'); }
function closeSettings() { $('settingsPanel').classList.remove('open'); }
$('btnSaveSettings').onclick = async () => { const nn = norm($('settingsNick').value); if (nn !== norm(me.nick)) { const r = await fetch(FIREBASE_URL + '/users/' + nn + '.json'); if (r.ok && await r.json()) return alert('Никнейм занят'); } const np = $('settingsPass').value; if (np && np.length < 4) return alert('Пароль от 4'); me.nick = nn || me.nick; me.status = $('settingsStatus').value.trim() || 'В сети'; me.bio = $('settingsBio').value.trim(); me.email = norm($('settingsEmail').value) || me.email; if (np.length >= 4) me.pass = np; await saveUser(me); updateUI(); closeSettings(); refresh(); };
$('btnLogout').onclick = () => { if (stream) stream.getTracks().forEach(t => t.stop()); me = null; activeChat = null; $('appScreen').classList.add('hidden'); $('authScreen').classList.remove('hidden'); };
function showDonate() { $('donateModal').classList.remove('hidden'); }
$('btnAddFriend').onclick = () => { $('addFriendModal').classList.remove('hidden'); $('friendNickInput').value = ''; $('addFriendError').textContent = ''; $('addFriendSuccess').textContent = ''; $('userSuggestions').style.display = 'none'; };
$('btnCancelAddFriend').onclick = () => $('addFriendModal').classList.add('hidden');
$('btnConfirmAddFriend').onclick = async () => { const nick = $('friendNickInput').value.trim(); if (!nick || norm(nick) === norm(me.nick)) return; const r = await fetch(FIREBASE_URL + '/users/' + nick + '.json'); if (!r.ok || !(await r.json())) return $('addFriendError').textContent = 'Не найден'; if (!me.friends) me.friends = []; if (me.friends.includes(nick)) return $('addFriendError').textContent = 'Уже в друзьях'; me.friends.push(nick); await saveUser(me); const fr = await fetch(FIREBASE_URL + '/users/' + nick + '.json'); if (fr.ok) { const f = await fr.json(); if (f && !f.friends) f.friends = []; if (f) { f.friends.push(me.nick); await saveUser(f); } } $('addFriendSuccess').textContent = 'Добавлен!'; setTimeout(() => { $('addFriendModal').classList.add('hidden'); refresh(); }, 800); };
$('searchChats').oninput = refresh;
$('btnBack').onclick = closeChat;
document.addEventListener('click', (e) => { if (!$('friendNickInput')?.contains(e.target)) $('userSuggestions').style.display = 'none'; });
loadDB();
</script>
