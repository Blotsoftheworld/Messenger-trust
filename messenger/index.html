<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доверие — Мессенджер</title>
    <style>
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --chat: #08080d;
            --input: #161622; --msg-own: #5b4ae0; --msg-other: #1e1e2e;
            --accent: #6c5ce7; --text: #e4e4f0; --text2: #a0a0b8;
            --text3: #6b6b80; --border: #1f1f30; --red: #e74c3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #000; color: var(--text); height: 100dvh; overflow: hidden; display: flex; }
        #authScreen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #12121a, #050508); z-index: 10; }
        #authScreen.hidden { display: none; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 360px; text-align: center; }
        .card h1 { color: var(--accent); margin-bottom: 12px; }
        .tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 2px; margin-bottom: 16px; }
        .tab { flex: 1; padding: 8px; border: none; background: none; color: var(--text2); cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 13px; }
        .tab.active { background: var(--accent); color: #fff; }
        .form { display: none; flex-direction: column; gap: 8px; }
        .form.active { display: flex; }
        input { padding: 10px; background: var(--input); border: 2px solid var(--border); border-radius: 8px; color: var(--text); outline: none; font-size: 14px; }
        button { padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .error { color: var(--red); font-size: 11px; min-height: 14px; }
        #appScreen { display: flex; width: 100vw; height: 100dvh; }
        #appScreen.hidden { display: none; }
        .sidebar { width: 280px; background: #0e0e15; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-head { padding: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; }
        .chat-list { flex: 1; overflow-y: auto; padding: 4px; }
        .chat-item { padding: 10px; border-radius: 8px; cursor: pointer; }
        .chat-item:hover { background: rgba(108,92,231,0.1); }
        .main { flex: 1; display: flex; flex-direction: column; background: var(--chat); }
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 13px; }
        .msg.own { align-self: flex-end; background: var(--msg-own); color: #fff; }
        .msg.other { align-self: flex-start; background: var(--msg-other); }
        .input-area { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; background: #0e0e15; }
        .input-area input { flex: 1; border-radius: 20px; }
        .icon-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--input); border: none; color: var(--text2); cursor: pointer; font-size: 16px; }
        .icon-btn.send { background: var(--accent); color: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="authScreen">
    <div class="card">
        <h1>🔐 Доверие</h1>
        <div class="tabs">
            <button class="tab active" id="tabLogin">Вход</button>
            <button class="tab" id="tabReg">Регистрация</button>
        </div>
        <form class="form active" id="loginForm">
            <input id="loginNick" placeholder="Никнейм">
            <input id="loginPass" type="password" placeholder="Пароль">
            <div class="error" id="loginError"></div>
            <button type="submit">Войти</button>
        </form>
        <form class="form" id="regForm">
            <input id="regNick" placeholder="Никнейм">
            <input id="regPass" type="password" placeholder="Пароль">
            <div class="error" id="regError"></div>
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>
</div>

<div id="appScreen" class="hidden">
    <div class="sidebar">
        <div class="sidebar-head">
            <div class="avatar" id="myAvatar">?</div>
            <div style="flex:1"><b id="myName"></b></div>
            <button class="icon-btn" id="btnAddFriend">+</button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>
    <div class="main">
        <div id="emptyChat" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3)">Выберите чат</div>
        <div id="chatHead" class="hidden" style="padding:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
            <button class="icon-btn" id="btnBack">←</button>
            <b id="partnerName"></b>
        </div>
        <div class="messages hidden" id="messagesContainer"></div>
        <div class="input-area hidden" id="inputArea">
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button class="icon-btn send" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
let me = null, chat = null, timer;

function norm(s) { return (s||'').toLowerCase().trim(); }

async function api(url, opt = {}) {
    const r = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opt });
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || 'Ошибка'); }
    return r.json();
}

$('tabLogin').onclick = () => { $('tabLogin').classList.add('active'); $('tabReg').classList.remove('active'); $('loginForm').classList.add('active'); $('regForm').classList.remove('active'); };
$('tabReg').onclick = () => { $('tabReg').classList.add('active'); $('tabLogin').classList.remove('active'); $('regForm').classList.add('active'); $('loginForm').classList.remove('active'); };

$('regForm').onsubmit = async (e) => {
    e.preventDefault();
    const nick = norm($('regNick').value), pass = $('regPass').value;
    if (nick.length < 3) return $('regError').textContent = 'Никнейм от 3 символов';
    try {
        await api('/api/register', { method: 'POST', body: JSON.stringify({ nick, pass }) });
        me = { nick, pass };
        showApp();
    } catch(e) { $('regError').textContent = e.message; }
};

$('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const nick = norm($('loginNick').value), pass = $('loginPass').value;
    try {
        me = await api('/api/login', { method: 'POST', body: JSON.stringify({ nick, pass }) });
        showApp();
    } catch(e) { $('loginError').textContent = e.message; }
};

function showApp() {
    $('authScreen').classList.add('hidden');
    $('appScreen').classList.remove('hidden');
    $('myAvatar').textContent = me.nick[0].toUpperCase();
    $('myName').textContent = me.nick;
    refresh();
    timer = setInterval(refresh, 2000);
}

async function refresh() {
    const chats = await api('/api/chats/' + me.nick);
    $('chatList').innerHTML = chats.map(c => `<div class="chat-item ${chat===c.partner?'active':''}" data-p="${c.partner}"><b>${c.partner}</b><br><small>${(c.last||'').slice(0,20)}</small></div>`).join('') || 'Нет чатов';
    document.querySelectorAll('.chat-item').forEach(el => el.onclick = () => openChat(el.dataset.p));
    if (chat) {
        const msgs = await api('/api/messages/' + me.nick + '/' + chat);
        $('messagesContainer').innerHTML = msgs.map(m => `<div class="msg ${m.from===me.nick?'own':'other'}">${m.text||''}</div>`).join('') || 'Начните переписку';
        $('messagesContainer').scrollTop = $('messagesContainer').scrollHeight;
    }
}

function openChat(p) {
    chat = p;
    $('emptyChat').classList.add('hidden'); $('chatHead').classList.remove('hidden');
    $('messagesContainer').classList.remove('hidden'); $('inputArea').classList.remove('hidden');
    $('partnerName').textContent = p;
    refresh();
}

$('sendBtn').onclick = async () => {
    const text = $('messageInput').value.trim();
    if (!text || !chat) return;
    await api('/api/messages', { method: 'POST', body: JSON.stringify({ from: me.nick, to: chat, text }) });
    $('messageInput').value = '';
    refresh();
};

$('btnAddFriend').onclick = async () => {
    const nick = prompt('Никнейм друга:');
    if (!nick) return;
    try {
        await api('/api/friends', { method: 'POST', body: JSON.stringify({ nick: me.nick, friend: norm(nick) }) });
        refresh();
    } catch(e) { alert(e.message); }
};

$('btnBack').onclick = () => { chat = null; $('emptyChat').classList.remove('hidden'); $('chatHead').classList.add('hidden'); $('messagesContainer').classList.add('hidden'); $('inputArea').classList.add('hidden'); };
</script>
</body>
</html>
